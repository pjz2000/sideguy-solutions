<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalUber - Request a Ride</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background-color: #f5f5f5; }
        #app { height: 100vh; display: flex; flex-direction: column; }
        #header { background-color: #000; color: #fff; padding: 10px; text-align: center; font-size: 24px; font-weight: bold; }
        #map { flex: 1; height: 400px; }
        #controls { padding: 20px; background-color: #fff; border-top: 1px solid #ddd; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select, button { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { background-color: #000; color: #fff; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background-color: #333; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #ride-info { margin-top: 15px; padding: 15px; background-color: #f0f0f0; border-radius: 5px; display: none; }
        .status { font-weight: bold; margin: 5px 0; }
        .success { color: green; }
    </style>
</head>
<body>
    <div id="app">
        <div id="header">LocalUber 🚗 - Request a Ride</div>
        <div id="map"></div>
        <div id="controls">
            <div class="input-group">
                <label for="pickup">Pickup Location</label>
                <input type="text" id="pickup" placeholder="Enter pickup address" value="Current Location">
            </div>
            <div class="input-group">
                <label for="dropoff">Dropoff Location</label>
                <input type="text" id="dropoff" placeholder="Enter dropoff address" required>
            </div>
            <div class="input-group">
                <label for="ride-type">Ride Type</label>
                <select id="ride-type">
                    <option value="uberx">UberX ($1.5/km)</option>
                    <option value="uberxl">UberXL ($2.5/km)</option>
                    <option value="uberblack">Uber Black ($4/km)</option>
                </select>
            </div>
            <button id="request-btn" onclick="requestRide()">Request Ride</button>
            <div id="ride-info"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Map setup
        const map = L.map('map').setView([40.7128, -74.0060], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);
        L.marker([40.7128, -74.0060]).addTo(map).bindPopup('Your Location').openPopup();

        // Fake drivers
        const drivers = [
            { name: 'John D.', lat: 40.7150, lng: -74.0000, car: 'Toyota Prius' },
            { name: 'Sarah K.', lat: 40.7100, lng: -74.0100, car: 'Honda Civic' },
            { name: 'Mike R.', lat: 40.7200, lng: -74.0050, car: 'Tesla Model 3' }
        ];
        let markers = [];

        // Formspree endpoint - Using your hash!
        const FORMSPREE_URL = 'https://formspree.io/f/xanawjvp';

        async function requestRide() {
            const pickup = document.getElementById('pickup').value;
            const dropoff = document.getElementById('dropoff').value;
            const rideType = document.getElementById('ride-type').value;

            if (!dropoff) {
                alert('Please enter a dropoff location!');
                return;
            }

            // Disable button during send
            const btn = document.getElementById('request-btn');
            btn.disabled = true;
            btn.textContent = 'Sending...';

            // Send to Formspree (emails peter.z@kromeon.com automatically)
            const formData = new FormData();
            formData.append('pickup', pickup);
            formData.append('dropoff', dropoff);
            formData.append('ride_type', rideType);
            formData.append('_subject', 'New LocalUber Ride Request 🚗');

            try {
                const response = await fetch(FORMSPREE_URL, {
                    method: 'POST',
                    body: formData,
                    headers: { 'Accept': 'application/json' }
                });
                if (response.ok) {
                    console.log('Request sent to email!');
                } else {
                    throw new Error('Send failed');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Oops—request didn\'t send. Try again or email peter.z@kromeon.com directly!');
            }

            // Re-enable button
            btn.disabled = false;
            btn.textContent = 'Request Ride';

            // Show fun sim (keeps user happy)
            document.getElementById('ride-info').style.display = 'block';
            document.getElementById('ride-info').innerHTML = '<div class="status success">Request sent to SideGuy! 🚀 Searching drivers...</div>';

            // Clear/add markers
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            drivers.forEach(d => {
                const marker = L.marker([d.lat, d.lng]).addTo(map).bindPopup(`Driver: ${d.name}<br>Car: ${d.car}`);
                markers.push(marker);
            });

            // Fake assignment
            setTimeout(() => {
                const driver = drivers[Math.random() * drivers.length | 0];
                const distance = (Math.random() * 10 + 1).toFixed(1);
                const prices = { uberx: 1.5, uberxl: 2.5, uberblack: 4 };
                const price = (distance * prices[rideType]).toFixed(2);

                document.getElementById('ride-info').innerHTML = `
                    <div class="status success">Ride matched! (Check email for details)</div>
                    <div>Driver: ${driver.name} | ${driver.car}</div>
                    <div>Distance: ${distance} km | $${price}</div>
                    <div>ETA: 3-5 min | Reply to email to confirm!</div>
                    <button onclick="location.reload()">New Request</button>
                `;
            }, 2000);
        }

        // Fake geocode on dropoff change
        document.getElementById('dropoff').addEventListener('change', () => {
            const lat = 40.7128 + (Math.random() - 0.5) * 0.02;
            const lng = -74.0060 + (Math.random() - 0.5) * 0.02;
            map.setView([lat, lng], 13);
            L.marker([lat, lng]).addTo(map).bindPopup('Dropoff').openPopup();
        });
    </script>
</body>
</html>
