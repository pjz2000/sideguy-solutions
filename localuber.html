<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalUber - Request a Ride | SideGuy Solutions</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background-color: #f5f5f5; }
        #app { height: 100vh; display: flex; flex-direction: column; }
        #header { background-color: #000; color: #fff; padding: 10px; text-align: center; font-size: 24px; font-weight: bold; }
        #map { flex: 1; height: 400px; }
        #controls { padding: 20px; background-color: #fff; border-top: 1px solid #ddd; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select, button { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { background-color: #000; color: #fff; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background-color: #333; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #ride-info { margin-top: 15px; padding: 15px; background-color: #f0f0f0; border-radius: 5px; display: none; }
        .status { font-weight: bold; margin: 5px 0; }
        .success { color: green; }
    </style>
</head>
<body>
    <div id="app">
        <div id="header">LocalUber 🚗 - Request a Ride</div>
        <div id="map"></div>
        <div id="controls">
            <form id="ride-form">
                <div class="input-group">
                    <label for="pickup">Pickup Location</label>
                    <input type="text" id="pickup" name="pickup" placeholder="Enter pickup address" value="Current Location" required>
                </div>
                <div class="input-group">
                    <label for="dropoff">Dropoff Location</label>
                    <input type="text" id="dropoff" name="dropoff" placeholder="Enter dropoff address" required>
                </div>
                <div class="input-group">
                    <label for="ride-type">Ride Type</label>
                    <select id="ride-type" name="ride_type">
                        <option value="uberx">UberX ($1.5/km)</option>
                        <option value="uberxl">UberXL ($2.5/km)</option>
                        <option value="uberblack">Uber Black ($4/km)</option>
                    </select>
                </div>
                <input type="hidden" name="_subject" value="New LocalUber Ride Request 🚗">
                <input type="hidden" name="_next" value="https://www.sideguysolutions.com/localuber.html?success=true">
                <button type="submit" id="request-btn">Request Ride</button>
            </form>
            <div id="ride-info"></div>
        </div>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Map setup (NYC default; swap coords for SoCal if wanted)
        const map = L.map('map').setView([32.8998, -117.2040], 13); // Solana Beach area
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);
        L.marker([32.8998, -117.2040]).addTo(map).bindPopup('Your Location').openPopup();

        // Fake local drivers
        const drivers = [
            { name: 'John D.', lat: 32.9020, lng: -117.2010, car: 'Toyota Prius' },
            { name: 'Sarah K.', lat: 32.8970, lng: -117.2070, car: 'Honda Civic' },
            { name: 'Mike R.', lat: 32.9050, lng: -117.2030, car: 'Tesla Model 3' }
        ];
        let markers = [];

        // Formspree endpoint (your hash)
        const FORMSPREE_URL = 'https://formspree.io/f/xanawjvp';

        const form = document.getElementById('ride-form');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(form);
            const btn = document.getElementById('request-btn');
            btn.disabled = true;
            btn.textContent = 'Sending...';

            try {
                const response = await fetch(FORMSPREE_URL, {
                    method: 'POST',
                    body: formData,
                    headers: { 'Accept': 'application/json' }
                });
                if (response.ok) {
                    document.getElementById('ride-info').style.display = 'block';
                    document.getElementById('ride-info').innerHTML = '<div class="status success">Request sent to peter.z@kromeon.com! 🚀 Searching drivers...</div>';

                    // Add markers
                    markers.forEach(m => map.removeLayer(m));
                    markers = [];
                    drivers.forEach(d => {
                        const marker = L.marker([d.lat, d.lng]).addTo(map).bindPopup(`Driver: ${d.name}<br>Car: ${d.car}`);
                        markers.push(marker);
                    });

                    // Fake assignment
                    setTimeout(() => {
                        const driver = drivers[Math.floor(Math.random() * drivers.length)];
                        const distance = (Math.random() * 10 + 1).toFixed(1);
                        const prices = { uberx: 1.5, uberxl: 2.5, uberblack: 4 };
                        const price = (distance * prices[formData.get('ride_type')]).toFixed(2);

                        document.getElementById('ride-info').innerHTML = `
                            <div class="status success">Ride matched! (Email sent—reply to confirm)</div>
                            <div>Driver: ${driver.name} | ${driver.car}</div>
                            <div>Distance: ${distance} km | $${price}</div>
                            <div>ETA: 3-5 min</div>
                            <button type="button" onclick="location.reload()">New Request</button>
                        `;
                    }, 2000);
                } else {
                    throw new Error('Send failed');
                }
            } catch (error) {
                alert('Send issue—try again or email peter.z@kromeon.com!');
                console.error(error);
            }

            btn.disabled = false;
            btn.textContent = 'Request Ride';
        });

        // Success param check
        if (location.search.includes('success')) {
            document.getElementById('ride-info').innerHTML = '<div class="status success">Thanks! Email sent to SideGuy. Expect a reply soon.</div>';
            document.getElementById('ride-info').style.display = 'block';
        }

        // Fake geocode (pans map on dropoff input)
        document.getElementById('dropoff').addEventListener('change', () => {
            const lat = 32.8998 + (Math.random() - 0.5) * 0.02;
            const lng = -117.2040 + (Math.random() - 0.5) * 0.02;
            map.setView([lat, lng], 13);
            L.marker([lat, lng]).addTo(map).bindPopup('Dropoff').openPopup();
        });
    </script>
</body>
</html>
