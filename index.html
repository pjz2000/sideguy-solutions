<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js";

let scene, camera, renderer, oceanMesh, clock;
let waveUniforms;

export function initOceanSafe() {
  try {
    initOcean();
  } catch (e) {
    console.warn("Ocean init failed, using fallback:", e);
    useFallbackOcean();
  }
}

function initOcean() {
  clock = new THREE.Clock();

  // ---------------------------
  // Scene + Camera + Renderer
  // ---------------------------
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(
    62,
    window.innerWidth / window.innerHeight,
    0.1,
    200
  );
  camera.position.set(0, 2.4, 3.2);

  renderer = new THREE.WebGLRenderer({
    antialias: true,
    canvas: document.getElementById("ocean-canvas"),
  });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.6));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x020617, 1);

  // ---------------------------
  // ALADDEEN MODE++ SHADER
  // ---------------------------
  waveUniforms = {
    uTime: { value: 0 },
    uBigWaveElevation: { value: 0.38 },
    uBigWaveFrequency: { value: new THREE.Vector2(0.28, 0.42) },
    uBigWaveSpeed: { value: 0.13 },

    uSmallWaveElevation: { value: 0.18 },
    uSmallWaveFrequency: { value: 2.8 },
    uSmallWaveSpeed: { value: 0.22 },
    uSmallWaveIterations: { value: 6 },

    uDeepColor: { value: new THREE.Color("#001220") },
    uSurfaceColor: { value: new THREE.Color("#38bdf8") },
    uHorizonGlow: { value: new THREE.Color("#5ee7ff") },

    uColorOffset: { value: 0.07 },
    uColorMultiplier: { value: 2.4 },

    uFresnelPower: { value: 3.6 },
    uFresnelIntensity: { value: 1.4 },
    uFresnelBias: { value: 0.18 },

    uGlowStrength: { value: 0.48 },
  };

  const oceanGeometry = new THREE.PlaneGeometry(16, 16, 512, 512);
  const oceanMaterial = new THREE.ShaderMaterial({
    vertexShader: `
      uniform float uTime;
      uniform float uBigWaveElevation;
      uniform vec2 uBigWaveFrequency;
      uniform float uBigWaveSpeed;

      uniform float uSmallWaveElevation;
      uniform float uSmallWaveFrequency;
      uniform float uSmallWaveSpeed;
      uniform float uSmallWaveIterations;

      varying float vElevation;
      varying vec2 vUv;

      // Sin wave
      float wave(vec2 p, float freq, float speed, float elevation) {
        return sin(p.x * freq + uTime * speed) *
               sin(p.y * freq + uTime * speed) *
               elevation;
      }

      void main() {
        vUv = uv;

        vec3 pos = position;

        // --- Big swell ---
        float big = sin(pos.x * uBigWaveFrequency.x + uTime * uBigWaveSpeed)
                  * sin(pos.y * uBigWaveFrequency.y + uTime * uBigWaveSpeed)
                  * uBigWaveElevation;

        // --- Small ripples ---
        float small = 0.0;
        for (float i = 1.0; i <= 6.0; i++) {
          small += wave(pos.xz * i, uSmallWaveFrequency * i, uSmallWaveSpeed, uSmallWaveElevation / i);
        }

        vElevation = big + small;
        pos.z += vElevation;

        gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
      }
    `,
    fragmentShader: `
      uniform float uTime;

      uniform vec3 uDeepColor;
      uniform vec3 uSurfaceColor;
      uniform vec3 uHorizonGlow;

      uniform float uColorOffset;
      uniform float uColorMultiplier;

      uniform float uFresnelPower;
      uniform float uFresnelIntensity;
      uniform float uFresnelBias;

      uniform float uGlowStrength;

      varying float vElevation;
      varying vec2 vUv;

      void main() {
        // Base color blend
        float mixStrength = (vElevation + uColorOffset) * uColorMultiplier;
        vec3 waterColor = mix(uDeepColor, uSurfaceColor, mixStrength);

        // Fresnel glow (magical shimmer)
        float fresnel = pow(1.0 - dot(normalize(vec3(vUv, vElevation)), vec3(0.0, 0.0, 1.0)), uFresnelPower);
        fresnel = uFresnelIntensity * fresnel + uFresnelBias;

        // Horizon shimmer
        float horizon = smoothstep(0.75, 1.0, vUv.y);
        vec3 horizonColor = uHorizonGlow * horizon;

        // Magical glow overlay
        vec3 glow = uSurfaceColor * fresnel * uGlowStrength;

        vec3 finalColor = waterColor + glow + horizonColor;

        gl_FragColor = vec4(finalColor, 1.0);
      }
    `,
    transparent: false,
    side: THREE.DoubleSide,
  });

  oceanMesh = new THREE.Mesh(oceanGeometry, oceanMaterial);
  oceanMesh.rotation.x = -Math.PI / 2;
  scene.add(oceanMesh);

  animate();
}

// ------------------------------------------------
// ANIMATION LOOP
// ------------------------------------------------
function animate() {
  requestAnimationFrame(animate);

  const elapsed = clock.getElapsedTime();
  waveUniforms.uTime.value = elapsed;

  // Cinematic camera drift
  camera.position.x = Math.sin(elapsed * 0.08) * 0.4;
  camera.position.z = 3.2 + Math.sin(elapsed * 0.05) * 0.2;
  camera.lookAt(0, 0, 0);

  renderer.render(scene, camera);
}

// ------------------------------------------------
// FALLBACK (STATIC GRADIENT)
// ------------------------------------------------
function useFallbackOcean() {
  const canvas = document.getElementById("ocean-canvas");
  canvas.style.background =
    "radial-gradient(circle at top, #0ea5e9 0%, #020617 70%)";
}

// ------------------------------------------------
// RESIZE HANDLER
// ------------------------------------------------
window.addEventListener("resize", () => {
  if (!camera || !renderer) return;
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

/* DFS calculator */
function americanToDecimal(oddsStr) {
  const cleaned = (oddsStr || "").toString().trim().replace(/[^\d+-]/g, "");
  const odds = parseFloat(cleaned);
  if (!odds || odds === 0) return null;
  return odds > 0 ? odds / 100 + 1 : 100 / Math.abs(odds) + 1;
}

function runDFScalc() {
  const leg1 = americanToDecimal(document.getElementById("dfs-leg1").value);
  const leg2 = americanToDecimal(document.getElementById("dfs-leg2").value);
  const boost = parseFloat(document.getElementById("dfs-boost").value || "0");
  const outEl = document.getElementById("dfs-result");

  outEl.style.display = "block";

  if (!leg1 || !leg2) {
    outEl.textContent = "Use American odds like -110 or +120.";
    return;
  }

  const comboDec = leg1 * leg2;
  const boosted = comboDec * (1 + boost / 100);

  function decToAmerican(dec) {
    const imp = dec - 1;
    if (imp >= 1) return "+" + Math.round(imp * 100);
    return "-" + Math.round(100 / imp);
  }

  outEl.innerHTML =
    "2-leg combo: <strong>" +
    comboDec.toFixed(2) +
    "x</strong> (" +
    decToAmerican(comboDec) +
    ").<br>" +
    (boost
      ? "Boosted: <strong>" +
        boosted.toFixed(2) +
        "x</strong> (" +
        decToAmerican(boosted) +
        ")."
      : "");
}

function runTicketCalc() {
  const price = parseFloat(document.getElementById("ticket-price").value || "0");
  const feePct = parseFloat(document.getElementById("ticket-fee").value || "0");
  const cap = parseInt(document.getElementById("ticket-cap").value || "0", 10);
  const outEl = document.getElementById("ticket-result");

  outEl.style.display = "block";

  if (!price || !feePct || !cap) {
    outEl.textContent = "Add price, platform fee %, and venue capacity.";
    return;
  }

  const feePer = price * (feePct / 100);
  const fees = feePer * cap;
  const gross = (price + feePer) * cap;

  const improvedFeePct = Math.max(feePct - 2, 0);
  const improvedFees = cap * (price * (improvedFeePct / 100));
  const savings = fees - improvedFees;

  outEl.innerHTML =
    "Full room (" +
    cap +
    " tickets) at $" +
    price +
    " + " +
    feePct +
    "% fees = <strong>$" +
    fees.toFixed(0) +
    "</strong> skimmed.<br><br>" +
    "Remove ~2%, venue keeps ~<strong>$" +
    savings.toFixed(0) +
    "</strong> extra.";
}
