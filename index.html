<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>SideGuy Solutions | Coastal Tech Concierge</title>

  <meta name="description" content="SideGuy Solutions — San Diego coastal tech concierge. Apps, AI, Web3, ticketing, and DFS tools. Summon PJ through the ocean portal." />

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: #020617;
      color: white;
      overflow-x: hidden;
    }

    header {
      width: 100%;
      padding: 14px 20px;
      box-sizing: border-box;
      backdrop-filter: blur(12px);
      background: rgba(2, 6, 23, 0.7);
      border-bottom: 1px solid rgba(56, 189, 248, 0.3);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .brand {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .hero {
      max-width: 1100px;
      margin: 0 auto;
      padding: 60px 20px;
      text-align: left;
      position: relative;
      z-index: 2;
    }

    .hero h1 {
      font-size: 3rem;
      font-weight: 800;
      margin-bottom: 12px;
      background: linear-gradient(to right, #e0f2fe, #38bdf8, #a5f3fc);
      -webkit-background-clip: text;
      color: transparent;
    }

    .hero p {
      max-width: 480px;
      color: #cbd5e1;
      line-height: 1.6;
      margin-bottom: 24px;
      font-size: 1rem;
    }

    .btn {
      background: #38bdf8;
      color: #020617;
      padding: 12px 20px;
      border-radius: 999px;
      border: none;
      font-weight: 700;
      letter-spacing: 0.08em;
      cursor: pointer;
      text-transform: uppercase;
      box-shadow: 0 0 20px rgba(56, 189, 248, 0.7);
    }

    #ocean-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    footer {
      text-align: center;
      padding: 30px 20px;
      font-size: 0.85rem;
      color: #94a3b8;
      border-top: 1px solid rgba(56,189,248,0.3);
      background: rgba(2,6,23,0.85);
      margin-top: 60px;
    }
  </style>
</head>

<body>

  <!-- Ocean Background -->
  <canvas id="ocean-canvas"></canvas>

  <!-- HEADER -->
  <header>
    <div class="brand">SideGuy Solutions — V22 Perfect Ocean</div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <h1>Where San Diego Builds & Scales</h1>

    <p>
      Custom apps, AI automation, Web3 rails, ticketing flows, and DFS tools.
      Built from Solana Beach with coastal precision.
    </p>

    <button class="btn">Tap to Summon PJ</button>
  </section>

  <!-- FOOTER -->
  <footer>
    SideGuy Solutions · North County San Diego · If you don't have an AI department, you're so 24.
  </footer>

  <!-- PERFECT OCEAN ENGINE -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <script>
    let scene, camera, renderer, oceanMesh, oceanMaterial;
    let startTime = Date.now();

    function initOcean() {
      const canvas = document.getElementById("ocean-canvas");

      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(
        55,
        window.innerWidth / window.innerHeight,
        0.1,
        100
      );
      camera.position.set(0, 1.1, 2.3);

      renderer = new THREE.WebGLRenderer({
        canvas,
        alpha: true,
        antialias: true,
      });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(window.devicePixelRatio);

      const geo = new THREE.PlaneGeometry(8, 8, 260, 260);

      oceanMaterial = new THREE.ShaderMaterial({
        uniforms: {
          uTime: { value: 0 },
          uWaveAmp: { value: 1.45 },
          uBlueDeep: { value: new THREE.Color("#021529") },
          uBlueHigh: { value: new THREE.Color("#2fc4ff") },
        },
        vertexShader: `
          uniform float uTime;
          uniform float uWaveAmp;
          varying vec2 vUv;

          void main() {
            vUv = uv;
            vec3 pos = position;
            float t = uTime * 0.2;

            float w1 = sin(pos.x * 1.5 + t) * 0.12;
            float w2 = sin(pos.y * 2.0 - t * 1.3) * 0.18;
            float w3 = sin(pos.x * 2.2 + pos.y * 1.8 + t * 1.4) * 0.09;

            pos.z += (w1 + w2 + w3) * uWaveAmp;

            gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
          }
        `,
        fragmentShader: `
          uniform float uTime;
          uniform vec3 uBlueDeep;
          uniform vec3 uBlueHigh;
          varying vec2 vUv;

          void main() {
            float t = uTime * 0.12;

            float shade = sin(vUv.x * 8.0 + t * 2.0) * 0.15 +
                          sin(vUv.y * 6.0 - t * 1.4) * 0.12;

            float mixVal = vUv.y * 0.85 + shade;

            vec3 color = mix(uBlueDeep, uBlueHigh, mixVal);
            gl_FragColor = vec4(color, 1.0);
          }
        `,
        side: THREE.DoubleSide,
      });

      oceanMesh = new THREE.Mesh(geo, oceanMaterial);
      oceanMesh.rotation.x = -Math.PI * 0.5;
      scene.add(oceanMesh);

      animateOcean();
    }

    function animateOcean() {
      requestAnimationFrame(animateOcean);

      const t = (Date.now() - startTime) * 0.001;
      oceanMaterial.uniforms.uTime.value = t;

      camera.position.x = Math.sin(t * 0.18) * 0.35;
      camera.position.y = 1.1 + Math.sin(t * 0.1) * 0.05;
      camera.lookAt(0, 0, 0);

      renderer.render(scene, camera);
    }

    window.addEventListener("resize", () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    });

    document.addEventListener("DOMContentLoaded", () => {
      setTimeout(initOcean, 120);
    });
  </script>

</body>
</html>
