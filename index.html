<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Ocean Debug</title>
<style>html,body{margin:0;height:100%;overflow:hidden}#c{position:fixed;inset:0}</style>
</head>
<body>
<canvas id="c"></canvas>
<script type="module">
  import * as THREE from "https://unpkg.com/three@0.152.2/build/three.module.js";
  import { Water } from "https://unpkg.com/three@0.152.2/examples/jsm/objects/Water.js?module";
  import { Sky } from "https://unpkg.com/three@0.152.2/examples/jsm/objects/Sky.js?module";

  const renderer = new THREE.WebGLRenderer({canvas: document.getElementById('c'), antialias:true, alpha:true});
  console.log("WebGL2:", renderer.capabilities.isWebGL2, renderer.getContext());
  renderer.setSize(window.innerWidth, window.innerHeight);
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 1, 20000);
  camera.position.set(0,55,135);
  const sun = new THREE.Vector3();

  const sky = new Sky();
  sky.scale.setScalar(10000);
  scene.add(sky);
  const skyU = sky.material.uniforms;
  skyU.turbidity.value = 10; skyU.rayleigh.value = 3;
  skyU.mieCoefficient.value = 0.008; skyU.mieDirectionalG.value = 0.9;

  const waterGeo = new THREE.PlaneGeometry(10000,10000);
  const waterNormals = new THREE.TextureLoader().load(
    "https://unpkg.com/three@0.152.2/examples/textures/waternormals.jpg",
    t=>{t.wrapS=t.wrapT=THREE.RepeatWrapping}
  );
  const water = new Water(waterGeo, {
    textureWidth:1024, textureHeight:1024,
    waterNormals, sunDirection:new THREE.Vector3(),
    waterColor:"#0b3b66", distortionScale:4.0
  });
  water.rotation.x = -Math.PI/2;
  scene.add(water);

  function updateSun(t){
    const elevation=80; const azimuth=180;
    const phi=THREE.MathUtils.degToRad(90-elevation);
    const theta=THREE.MathUtils.degToRad(azimuth);
    sun.setFromSphericalCoords(1,phi,theta);
    sky.material.uniforms.sunPosition.value.copy(sun);
    water.material.uniforms.sunDirection.value.copy(sun).normalize();
  }
  updateSun();

  function animate(){
    requestAnimationFrame(animate);
    if(water.material.uniforms.time) water.material.uniforms.time.value+=1/60;
    renderer.render(scene,camera);
  }
  animate();
</script>
</body>
</html>
