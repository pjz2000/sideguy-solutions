
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>SideGuy Solutions | Cinematic Ocean Engine</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    height: 100%;
    background: #001524;
  }

  #ocean-canvas {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
  }

  #label {
    position: fixed;
    top: 20px;
    left: 20px;
    font-family: sans-serif;
    color: #8bdcff;
    font-size: 14px;
    z-index: 10;
    letter-spacing: 1px;
    text-shadow: 0 0 6px #000;
  }
</style>
</head>

<body>

<div id="label">🌊 SideGuy Ocean Engine — V4 Cinema</div>
<canvas id="ocean-canvas"></canvas>

<!-- Three.js -->
<script src="https://unpkg.com/three@0.138.0/build/three.min.js"></script>

<!-- Water + Sky -->
<script src="https://unpkg.com/three@0.138.0/examples/js/objects/Water.js"></script>
<script src="https://unpkg.com/three@0.138.0/examples/js/objects/Sky.js"></script>

<!-- Post Processing for BLOOM -->
<script src="https://unpkg.com/three@0.138.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://unpkg.com/three@0.138.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://unpkg.com/three@0.138.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

<script>
/* ===========================================================
   FULL OCEAN ENGINE V4 — CINEMATIC + ORB + BLOOM
   =========================================================== */

let camera, scene, renderer, water, sky, sun;
let orbGroup, orb, orbLight, rippleLight;
let composer, bloomPass;

let camTime = 0;
let camSpeed = 0.00035;

init();
animate();

function init() {
  const canvas = document.getElementById("ocean-canvas");

  renderer = new THREE.WebGLRenderer({
    canvas: canvas,
    antialias: true,
    powerPreference: "high-performance"
  });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);

  scene = new THREE.Scene();

  /* ---- CAMERA ---- */
  camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 1, 20000);
  camera.position.set(0, 60, 160);

  /* ---- SUN ---- */
  sun = new THREE.Vector3();

  /* ---- SKY ---- */
  sky = new THREE.Sky();
  sky.scale.setScalar(10000);
  scene.add(sky);

  const skyU = sky.material.uniforms;
  skyU["turbidity"].value = 12;
  skyU["rayleigh"].value = 2.3;
  skyU["mieCoefficient"].value = 0.005;
  skyU["mieDirectionalG"].value = 0.8;

  updateSun();

  /* ---- WATER ---- */
  const waterGeometry = new THREE.PlaneGeometry(20000, 20000);
  const waterNormals = new THREE.TextureLoader().load(
    "https://threejs.org/examples/textures/waternormals.jpg",
    (tex) => {
      tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    }
  );

  water = new THREE.Water(waterGeometry, {
    textureWidth: 2048,
    textureHeight: 2048,
    waterNormals: waterNormals,
    sunDirection: sun,
    sunColor: 0xffffff,
    waterColor: 0x0066cc,
    distortionScale: 4.8,
    fog: false
  });
  water.rotation.x = -Math.PI / 2;
  scene.add(water);

  /* ===========================================================
     PART 3 — FLOATING ORB + GLOW LIGHT
     =========================================================== */

  orbGroup = new THREE.Group();
  scene.add(orbGroup);

  const orbGeom = new THREE.SphereGeometry(12, 64, 64);

  const orbMat = new THREE.MeshStandardMaterial({
    emissive: new THREE.Color(0x2ab8ff),
    emissiveIntensity: 4.2,
    color: 0x0a3d66,
    roughness: 0.2,
    metalness: 0.6
  });

  orb = new THREE.Mesh(orbGeom, orbMat);
  orbGroup.add(orb);

  orb.position.set(0, 22, 0);

  orbLight = new THREE.PointLight(0x35c7ff, 3.4, 350, 2);
  orbLight.position.set(0, 26, 0);
  orbGroup.add(orbLight);

  rippleLight = new THREE.PointLight(0x1188ff, 0.4, 200, 3);
  rippleLight.position.set(0, 5, 0);
  orbGroup.add(rippleLight);

  /* ---- POST PROCESSING + BLOOM (PART 4) ---- */
  composer = new THREE.EffectComposer(renderer);

  const renderScene = new THREE.RenderPass(scene, camera);
  composer.addPass(renderScene);

  bloomPass = new THREE.UnrealBloomPass(
    new THREE.Vector2(window.innerWidth, window.innerHeight),
    1.3,   // Bloom strength
    0.4,   // Radius
    0.85   // Threshold
  );
  composer.addPass(bloomPass);

  /* ---- ORB CLICK ---- */
  window.addEventListener("click", () => {
    const dist = camera.position.distanceTo(orb.position);
    if (dist < 300) {
      console.log("🔥 PJ PORTAL TRIGGERED");
      // add portal animation or email CTA here
    }
  });

  window.addEventListener("resize", onWindowResize);
}

/* ---- SUN UPDATE ---- */
function updateSun() {
  const phi = THREE.MathUtils.degToRad(88);
  const theta = THREE.MathUtils.degToRad(180);
  sun.setFromSphericalCoords(1, phi, theta);

  sky.material.uniforms["sunPosition"].value.copy(sun);
  if (water) water.material.uniforms["sunDirection"].value.copy(sun).normalize();
}

/* ---- RESIZE ---- */
function onWindowResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
}

/* ===========================================================
   MAIN ANIMATION LOOP — CAMERA MOTION + ORB + WATER + BLOOM
   =========================================================== */
function animate() {
  requestAnimationFrame(animate);

  // Water movement
  water.material.uniforms["time"].value += 0.8 / 60.0;

  // Camera drift
  camTime += camSpeed;
  camera.position.y = 60 + Math.sin(camTime * 1.5) * 1.8;
  camera.position.z = 160 + Math.sin(camTime * 0.35) * 8;
  camera.position.x = Math.sin(camTime * 0.25) * 12;
  camera.lookAt(0, 0, 0);

  // Orb floating
  orbGroup.position.y = 22 + Math.sin(camTime * 2.5) * 1.5;
  orbGroup.position.x = Math.sin(camTime * 0.6) * 3;
  orbGroup.position.z = Math.cos(camTime * 0.3) * 3;

  // Orb rotation
  orb.rotation.y += 0.003;

  // Ripple light flicker
  rippleLight.intensity = 0.3 + Math.sin(camTime * 6) * 0.06;

  // Render WITH bloom
  composer.render();
}
</script>

</body>
</html>
