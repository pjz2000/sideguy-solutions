  <!-- SCRIPTS -->
  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script>
    // ================================
    // DAY / NIGHT TINT
    // ================================
    (function setDayNight() {
      try {
        const hour = new Date().getHours();
        const root = document.documentElement;
        if (hour >= 6 && hour < 18) {
          root.style.setProperty("--bg", "var(--bg-day)");
          root.style.setProperty("--accent", "#38bdf8");
        } else {
          root.style.setProperty("--bg", "var(--bg-night)");
          root.style.setProperty("--accent", "var(--accent-night)");
        }
      } catch (e) {
        console.warn("Day/night tint error:", e);
      }
    })();

    // ================================
    // GLOBAL AUDIO ENGINE
    // ================================
    let audioReady = false;
    function prepareAudio() {
      if (audioReady) return;
      audioReady = true;
      const amb = document.getElementById("ocean-ambient");
      if (amb) {
        amb.volume = 0.14; // soft ambient bed
        amb.play().catch(() => {});
      }
    }
    window.addEventListener("click", prepareAudio);
    window.addEventListener("touchstart", prepareAudio);

    function playOceanSwell() {
      const sw = document.getElementById("ocean-swell");
      if (sw) {
        sw.currentTime = 0;
        sw.volume = 0.35;
        sw.play().catch(() => {});
      }
    }

    function playPortalWhoosh() {
      const pw = document.getElementById("portal-whoosh");
      if (pw) {
        pw.currentTime = 0;
        pw.volume = 0.45;
        pw.play().catch(() => {});
      }
    }

    function playMagicChime() {
      const mc = document.getElementById("magic-chime");
      if (mc) {
        mc.currentTime = 0;
        mc.volume = 0.3;
        mc.play().catch(() => {});
      }
    }

    function boostAmbientOcean(tempVolume, duration) {
      const amb = document.getElementById("ocean-ambient");
      if (!amb) return;
      const original = 0.14;
      amb.volume = tempVolume;
      setTimeout(() => {
        amb.volume = original;
      }, duration || 900);
    }

    // ================================
    // THREE.JS REAL PACIFIC (v14.2 feel + subtle magic)
    // ================================
    let oceanUniforms = null;
    let oceanScene, oceanCamera, oceanRenderer, oceanClock;

    function initOceanSafe() {
      const canvas = document.getElementById("ocean-canvas");
      if (!canvas || !window.THREE) {
        console.warn("No canvas or THREE — using gradient fallback.");
        return;
      }

      try {
        oceanScene = new THREE.Scene();
        oceanCamera = new THREE.PerspectiveCamera(
          60,
          window.innerWidth / window.innerHeight,
          0.1,
          200
        );
        oceanCamera.position.set(0, 2.1, 4.6);

        oceanRenderer = new THREE.WebGLRenderer({
          canvas,
          antialias: true
        });
        oceanRenderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        oceanRenderer.setSize(window.innerWidth, window.innerHeight);
        oceanRenderer.setClearColor(0x020617, 1);

        const geometry = new THREE.PlaneGeometry(26, 26, 260, 260);
        geometry.rotateX(-Math.PI / 2);

        // Tuned for "real Pacific" feel
        oceanUniforms = {
          uTime: { value: 0.0 },
          uBigElevation: { value: 0.32 },           // main slow swell
          uBigFreq: { value: new THREE.Vector2(0.48, 0.32) },
          uBigSpeed: { value: 0.12 },

          uSmallElevation: { value: 0.06 },         // little surface detail
          uSmallFreq: { value: 3.4 },
          uSmallSpeed: { value: 0.35 },

          uDeep: { value: new THREE.Color(0x00101b) },
          uMid:  { value: new THREE.Color(0x02486b) },
          uSurf: { value: new THREE.Color(0x7fd3ff) },

          uColorOffset: { value: 0.18 },
          uColorMult:   { value: 1.6 },

          uSunStrength:  { value: 0.55 },           // subtle shimmer band
          uSunSharpness: { value: 2.0 },
          uPeakShimmer:  { value: 1.0 },            // dialed DOWN vs v16.5

          uSparkleStrength: { value: 0.12 },        // very light magic
          uCameraRoll:      { value: 0.0 }
        };

        const vertexShader = `
          uniform float uTime;
          uniform float uBigElevation;
          uniform vec2  uBigFreq;
          uniform float uBigSpeed;
          uniform float uSmallElevation;
          uniform float uSmallFreq;
          uniform float uSmallSpeed;

          varying float vHeight;
          varying vec2  vUv;
          varying vec3  vWorldPos;

          float wave(vec2 p, vec2 freq, float speed, float amp) {
            float x = sin(dot(p, freq) + uTime * speed);
            float y = cos((p.x - p.y) * freq.x * 0.5 + uTime * speed * 1.1);
            return (x + y) * 0.5 * amp;
          }

          void main() {
            vUv = uv;
            vec3 pos = position;

            float big = wave(pos.xz, uBigFreq, uBigSpeed, uBigElevation);
            float small = wave(pos.xz * uSmallFreq, vec2(1.0,1.1), uSmallSpeed, uSmallElevation);

            vHeight = big + small;
            pos.y += vHeight;

            vec4 world = modelMatrix * vec4(pos, 1.0);
            vWorldPos = world.xyz;

            gl_Position = projectionMatrix * viewMatrix * world;
          }
        `;

        const fragmentShader = `
          uniform float uTime;
          uniform vec3  uDeep;
          uniform vec3  uMid;
          uniform vec3  uSurf;
          uniform float uColorOffset;
          uniform float uColorMult;
          uniform float uSunStrength;
          uniform float uSunSharpness;
          uniform float uPeakShimmer;
          uniform float uSparkleStrength;

          varying float vHeight;
          varying vec2  vUv;
          varying vec3  vWorldPos;

          // tiny hash/noise for subtle sparkle
          float hash(vec2 p) {
            return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123);
          }

          float noise(vec2 p) {
            vec2 i = floor(p);
            vec2 f = fract(p);
            float a = hash(i);
            float b = hash(i + vec2(1.0, 0.0));
            float c = hash(i + vec2(0.0, 1.0));
            float d = hash(i + vec2(1.0, 1.0));
            vec2 u = f * f * (3.0 - 2.0 * f);
            return mix(a, b, u.x) +
                   (c - a) * u.y * (1.0 - u.x) +
                   (d - b) * u.x * u.y;
          }

          void main() {
            float h = (vHeight + uColorOffset) * uColorMult;
            h = clamp(h, 0.0, 1.0);

            vec3 base = mix(uDeep, uMid, h * 0.7);
            base = mix(base, uSurf, pow(h, 1.9));

            // subtle horizon / sun shimmer band
            float bandBase = smoothstep(0.32, 0.9, vUv.y);
            float bandWave = sin(uTime * 0.12 + vUv.x * 4.0) * 0.15;
            float band = pow(clamp(bandBase + bandWave, 0.0, 1.0), uSunSharpness);

            // peaks shimmer (small, not neon)
            float peak = max(vHeight * uPeakShimmer, 0.0);
            peak = pow(peak, 1.6);

            vec3 color = base;
            color += vec3(0.20, 0.36, 0.55) * band * uSunStrength;
            color += vec3(0.18, 0.28, 0.36) * peak;

            // very light "magic" sparkle on crest areas, tied to noise
            float n = noise(vUv * 18.0 + vec2(uTime * 0.4, -uTime * 0.3));
            float sparkleMask = smoothstep(0.6, 1.0, h) * smoothstep(0.65, 1.0, n);
            color += vec3(0.22, 0.36, 0.52) * sparkleMask * uSparkleStrength;

            // vignette for depth
            float vignette = smoothstep(1.0, 0.3, length(vUv - 0.5));
            color *= mix(0.74, 1.18, vignette);

            gl_FragColor = vec4(color, 1.0);
          }
        `;

        const material = new THREE.ShaderMaterial({
          uniforms: oceanUniforms,
          vertexShader,
          fragmentShader,
          side: THREE.DoubleSide
        });

        const mesh = new THREE.Mesh(geometry, material);
        oceanScene.add(mesh);

        oceanClock = new THREE.Clock();

        function animateOcean() {
          requestAnimationFrame(animateOcean);
          const t = oceanClock.getElapsedTime();

          if (oceanUniforms) {
            oceanUniforms.uTime.value = t;
          }

          // gentle camera sway (Mode 1)
          const sway = Math.sin(t * 0.06) * 0.42;
          const swayZ = Math.sin(t * 0.04) * 0.24;
          const swayY = Math.sin(t * 0.05) * 0.12;

          oceanCamera.position.x = sway;
          oceanCamera.position.z = 4.6 + swayZ;
          oceanCamera.position.y = 2.1 + swayY;
          oceanCamera.lookAt(0, 0, 0);

          oceanRenderer.render(oceanScene, oceanCamera);
        }

        animateOcean();

        window.addEventListener("resize", () => {
          if (!oceanCamera || !oceanRenderer) return;
          oceanCamera.aspect = window.innerWidth / window.innerHeight;
          oceanCamera.updateProjectionMatrix();
          oceanRenderer.setSize(window.innerWidth, window.innerHeight);
        });
      } catch (err) {
        console.warn("Ocean init failed:", err);
      }
    }

    // ================================
    // REACTIVE WAVE BOOST (tap / move)
    // ================================
    let waveBoostTimeout;
    function boostWavesOnce() {
      if (!oceanUniforms || !oceanUniforms.uBigElevation) return;
      const base = 0.32;
      const boosted = 0.52;

      oceanUniforms.uBigElevation.value = boosted;
      clearTimeout(waveBoostTimeout);
      waveBoostTimeout = setTimeout(() => {
        oceanUniforms.uBigElevation.value = base;
      }, 1100);
    }

    window.addEventListener("mousemove", () => {
      boostWavesOnce();
    });
    window.addEventListener("touchstart", () => {
      boostWavesOnce();
    });

    // ================================
    // PORTAL CONTACT + FX
    // ================================
    function openContactPortal() {
      const isMobile = /Mobi|Android/i.test(navigator.userAgent);
      if (isMobile) {
        window.location.href =
          "sms:+17735441231?&body=" +
          encodeURIComponent(
            "Hey PJ, I just summoned the coastal portal from SideGuySolutions.com — let’s build something."
          );
      } else {
        const subject = encodeURIComponent("Summon PJ · SideGuy Solutions (San Diego)");
        const body = encodeURIComponent(
          "Hey PJ,\n\n" +
          "I just tapped the coastal portal on SideGuySolutions.com.\n\n" +
          "Here’s what I’m looking at:\n" +
          "- Tech build / app / site\n" +
          "- Tickets / live events\n" +
          "- DFS promos / systems\n" +
          "- Solana / crypto payments\n" +
          "- AI automation\n" +
          "- Something else entirely\n\n" +
          "Reply when you’re free and let’s spin this up.\n\n" +
          "— Sent from the coastal portal 🌊"
        );
        const mailtoUrl = "mailto:peter.z@kromeon.com?subject=" + subject + "&body=" + body;
        window.location.href = mailtoUrl;
      }
    }

    function triggerPortal() {
      prepareAudio();

      document.body.classList.add("portal-burst-flash");
      setTimeout(() => document.body.classList.remove("portal-burst-flash"), 450);

      const ring = document.createElement("div");
      ring.className = "portal-burst-ring";
      document.body.appendChild(ring);
      setTimeout(() => ring.remove(), 900);

      playPortalWhoosh();
      playMagicChime();
      playOceanSwell();
      boostAmbientOcean(0.34, 1500);
      boostWavesOnce();

      setTimeout(openContactPortal, 520);
    }

    // ================================
    // SCROLL HELPERS
    // ================================
    function scrollToIntake(prefillLane) {
      const select = document.getElementById("intake-type");
      if (select && prefillLane) {
        Array.from(select.options).forEach(opt => {
          if (opt.value === prefillLane) select.value = opt.value;
        });
      }
      const el = document.getElementById("intake");
      if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    // ================================
    // CALC HELPERS
    // ================================
    function pretty(n) {
      return Number(n).toLocaleString("en-US");
    }

    function runSolanaCalc() {
      const vol = parseFloat((document.getElementById("solana-volume") || {}).value || "0");
      const fee = parseFloat((document.getElementById("solana-fee") || {}).value || "0");
      const out = document.getElementById("solana-result");
      if (!out) return;
      out.style.display = "block";

      if (!vol || !fee) {
        out.innerHTML = "Enter both <strong>volume</strong> and <strong>fee %</strong>.";
        return;
      }

      const current = (fee / 100) * vol;
      const solana = vol * 0.003;
      const savings = current - solana;

      out.innerHTML = `
        <strong>Monthly Volume:</strong> $${pretty(vol)}<br>
        <strong>Your Fees:</strong> $${pretty(current)} / mo<br>
        <strong>Solana Fees:</strong> $${pretty(solana)} / mo<br><br>
        <strong>Savings:</strong> $${pretty(savings)} per month<br>
        <span style="color:#5ee7ff">That's what we map with Solana rails.</span>
      `;
    }

    function americanToDecimal(oddsStr) {
      const clean = (oddsStr || "").toString().trim();
      const odds = parseFloat(clean);
      if (!odds) return null;
      return odds > 0 ? odds / 100 + 1 : 100 / Math.abs(odds) + 1;
    }

    function runDFScalc() {
      const leg1 = americanToDecimal((document.getElementById("dfs-leg1") || {}).value);
      const leg2 = americanToDecimal((document.getElementById("dfs-leg2") || {}).value);
      const boost = parseFloat((document.getElementById("dfs-boost") || {}).value || "0");
      const out = document.getElementById("dfs-result");
      if (!out) return;
      out.style.display = "block";

      if (!leg1 || !leg2) {
        out.textContent = "Enter valid odds (e.g., -110, +125).";
        return;
      }

      const combo = leg1 * leg2;
      const boosted = combo * (1 + boost / 100);

      function decToAm(d) {
        const x = d - 1;
        return x >= 1 ? "+" + Math.round(x * 100) : "-" + Math.round(100 / x);
      }

      out.innerHTML = `
        <strong>2-leg Parlay:</strong> ${combo.toFixed(2)}x (${decToAm(combo)})<br>
        ${boost ? "<strong>Boosted:</strong> " + boosted.toFixed(2) + "x (" + decToAm(boosted) + ")" : ""}
      `;
    }

    function runTicketCalc() {
      const price = parseFloat((document.getElementById("ticket-price") || {}).value || "0");
      const fee = parseFloat((document.getElementById("ticket-fee") || {}).value || "0");
      const cap = parseFloat((document.getElementById("ticket-cap") || {}).value || "0");
      const out = document.getElementById("ticket-result");
      if (!out) return;
      out.style.display = "block";

      if (!price || !fee || !cap) {
        out.innerHTML = "Add price, platform fee %, and capacity.";
        return;
      }

      const perFee = (fee / 100) * price;
      const skim = perFee * cap;

      out.innerHTML = `
        <strong>Platform Skim:</strong> $${pretty(skim)}<br>
        <span style="color:#5ee7ff">That’s the number we attack for North County venues.</span>
      `;
    }

    // MODALS
    function openSavingsCalc() {
      const m = document.getElementById("modal-solana");
      if (m) m.style.display = "flex";
    }
    function closeSolana() {
      const m = document.getElementById("modal-solana");
      if (m) m.style.display = "none";
    }

    function openDFS() {
      const m = document.getElementById("modal-dfs");
      if (m) m.style.display = "flex";
    }
    function closeDFS() {
      const m = document.getElementById("modal-dfs");
      if (m) m.style.display = "none";
    }

    function openTickets() {
      const m = document.getElementById("modal-tickets");
      if (m) m.style.display = "flex";
    }
    function closeTickets() {
      const m = document.getElementById("modal-tickets");
      if (m) m.style.display = "none";
    }

    // ================================
    // DOM READY WIRING
    // ================================
    document.addEventListener("DOMContentLoaded", () => {
      // Init ocean
      initOceanSafe();

      // Nav smooth scroll
      document.querySelectorAll(".nav-links a[href^='#']").forEach(link => {
        link.addEventListener("click", e => {
          e.preventDefault();
          const id = link.getAttribute("href");
          const target = document.querySelector(id);
          if (target) {
            target.scrollIntoView({ behavior: "smooth", block: "start" });
          }
        });
      });

      const summonBtn = document.getElementById("summon-btn");
      const orb = document.getElementById("summon-orb");

      if (summonBtn) {
        summonBtn.addEventListener("click", () => {
          prepareAudio();
          triggerPortal();
        });
      }

      if (orb) {
        orb.addEventListener("click", () => {
          prepareAudio();
          playOceanSwell();
          playMagicChime();
          boostAmbientOcean(0.32, 1500);
          boostWavesOnce();
          triggerPortal();
        });
      }

      const toolkitBtn = document.getElementById("show-toolkit");
      if (toolkitBtn) {
        toolkitBtn.addEventListener("click", () => {
          const tk = document.getElementById("toolkit");
          if (tk) tk.scrollIntoView({ behavior: "smooth", block: "start" });
        });
      }

      // Intake form → email
      const intakeForm = document.getElementById("intake-form");
      if (intakeForm) {
        intakeForm.addEventListener("submit", e => {
          e.preventDefault();
          const name = (document.getElementById("intake-name") || {}).value || "";
          const email = (document.getElementById("intake-email") || {}).value || "";
          const biz = (document.getElementById("intake-biz") || {}).value || "";
          const type = (document.getElementById("intake-type") || {}).value || "Project";
          const budget = (document.getElementById("intake-budget") || {}).value || "";
          const notes = (document.getElementById("intake-notes") || {}).value || "";

          const subject = encodeURIComponent("New Project Intake · " + type);
          const bodyLines = [
            "Hey PJ,",
            "",
            "You’ve got a new intake from SideGuySolutions.com:",
            "",
            "Name: " + name,
            "Email: " + email,
            "Business / Project: " + biz,
            "Lane: " + type,
            "Budget: " + budget,
            "",
            "Notes:",
            notes,
            "",
            "Sent from the v17 Real Pacific portal 🌊"
          ];
          const body = encodeURIComponent(bodyLines.join("\n"));
          const mailtoUrl = "mailto:peter.z@kromeon.com?subject=" + subject + "&body=" + body;
          window.location.href = mailtoUrl;
        });
      }

      // Close modals on backdrop click
      ["modal-solana", "modal-dfs", "modal-tickets"].forEach(id => {
        const m = document.getElementById(id);
        if (!m) return;
        m.addEventListener("click", e => {
          if (e.target === m) m.style.display = "none";
        });
      });

      // FAQ toggle
      document.querySelectorAll(".faq-q").forEach(q => {
        q.addEventListener("click", () => {
          const a = q.nextElementSibling;
          if (!a) return;
          a.style.display = a.style.display === "block" ? "none" : "block";
        });
      });
    });

    // Bottom CTA reveal
    window.addEventListener("scroll", () => {
      const cta = document.getElementById("bottom-cta");
      if (!cta) return;
      if (window.scrollY > window.innerHeight * 0.7) {
        cta.style.opacity = "1";
        cta.style.pointerEvents = "all";
      } else {
        cta.style.opacity = "0";
        cta.style.pointerEvents = "none";
      }
    });
  </script>
