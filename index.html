<!DOCTYPE html>

  <style>
    :root {
      --bg: #02111f;
      --ocean-blue: #0a6bff;
      --solana-green: #14f195;
      --text: #e6f6ff;
      --muted: #a7c7dd;

    body {

    /* Fullscreen ocean canvas */

    /* Glowing orb buttons */

      box-shadow: 0 0 22px var(--solana-green);
    }

    /* Centered hero content */
    .hero {
      position: relative;
      z-index: 10;
      text-align: center;
      margin-top: 14vh;
      padding: 20px;
    }

    .hero-title {

      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text);

      margin: 0 auto 22px auto;

    /* Version & Timestamp */

      margin-top: 10px;
      font-size: 0.95rem;
      color: var(--solana-green);
      text-shadow: 0 0 8px var(--solana-green);

<body>
  <canvas id="ocean"></canvas>

    <div id="version"></div>

  <!-- Three.js Core -->
  <script src="https://unpkg.com/three@0.150.1/build/three.min.js"></script>

  <script>
    let scene, camera, renderer, oceanMesh, uniforms;

    function initOcean() {
      scene = new THREE.Scene();

      camera = new THREE.PerspectiveCamera(
        55,
        window.innerWidth / window.innerHeight,
        0.1,
        200
      );
      camera.position.set(0, 1.3, 3.2);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setClearColor(0x02111f, 1);
      document.getElementById("ocean").replaceWith(renderer.domElement);

      /* ---------- REAL OCEAN SHADER (V11) ---------- */
      uniforms = {
        uTime: { value: 0.0 },
        uWaveAmp: { value: 0.18 },
        uBlue: { value: new THREE.Color("#0a6bff") },
        uDeep: { value: new THREE.Color("#02111f") }
      };

      const oceanGeo = new THREE.PlaneGeometry(20, 20, 256, 256);

      const oceanMat = new THREE.ShaderMaterial({
        uniforms,
        vertexShader: `
          uniform float uTime;
          uniform float uWaveAmp;

          void main() {
            vec3 pos = position;

            float wave1 = sin(pos.x * 2.2 + uTime * 1.1) * uWaveAmp;
            float wave2 = sin(pos.y * 1.6 + uTime * 0.9) * (uWaveAmp * 0.7);
            float wave3 = sin((pos.x + pos.y) * 1.0 + uTime * 1.4) * (uWaveAmp * 0.5);

            pos.z += (wave1 + wave2 + wave3);

            gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
          }
        `,
        fragmentShader: `
          uniform vec3 uBlue;
          uniform vec3 uDeep;
          uniform float uTime;

          void main() {
            float pulse = sin(uTime * 0.4) * 0.15;
            vec3 color = mix(uDeep, uBlue, 0.55 + pulse);
            gl_FragColor = vec4(color, 1.0);
          }
        `,
        wireframe: false
      });

      oceanMesh = new THREE.Mesh(oceanGeo, oceanMat);
      oceanMesh.rotation.x = -Math.PI / 2;
      scene.add(oceanMesh);

      animate();
    }

    function animate() {
      requestAnimationFrame(animate);
      uniforms.uTime.value += 0.016;
      renderer.render(scene, camera);
    }

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
    <script>
    /* ------------------------------
        VERSION + TIMESTAMP
    ------------------------------ */
    function updateVersionStamp() {
      const now = new Date();

      const stamp =
        "v25.1 • " +
        now.toLocaleDateString() +
        " • " +
        now.toLocaleTimeString();

      document.getElementById("version").textContent = stamp;
    }

    /* ------------------------------
        ORB INTERACTION EFFECTS
    ------------------------------ */
    document.addEventListener("DOMContentLoaded", () => {
      updateVersionStamp();

      // Initialize ocean after slight delay for stability
      setTimeout(initOcean, 120);
    });

    // Button pulse effect
    document.querySelectorAll(".orb-btn").forEach((btn) => {
      btn.addEventListener("mouseenter", () => {
        btn.style.boxShadow = "0 0 26px var(--solana-green)";
      });
      btn.addEventListener("mouseleave", () => {
        btn.style.boxShadow = "0 0 12px var(--orb-glow)";
      });
    });
  </script>
