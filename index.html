<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PJ Ocean Test – Cinematic Blue</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
      background: #3ab6ff;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>

<body>
  <canvas id="ocean"></canvas>

  <script>
    const canvas = document.getElementById("ocean");
    const ctx = canvas.getContext("2d");

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener("resize", resize);

    // --- COLORS ---
    const topSky = "#66c8ff";        // Light sky blue
    const horizonSky = "#3ab6ff";    // Medium blue (haze)
    const deepOcean = "#0077be";     // Deep water
    const sunGlow = "rgba(255,255,200,0.25)";

    let t = 0;

    function draw() {
      t += 0.003;

      const w = canvas.width;
      const h = canvas.height;

      // ---- SKY GRADIENT ----
      const sky = ctx.createLinearGradient(0, 0, 0, h * 0.6);
      sky.addColorStop(0, topSky);
      sky.addColorStop(1, horizonSky);
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, w, h);

      // ---- SUN GLOW ----
      const sunY = h * 0.28;
      const sunX = w * 0.52;

      const sun = ctx.createRadialGradient(
        sunX, sunY, 20,
        sunX, sunY, 280
      );
      sun.addColorStop(0, "rgba(255,255,240,0.8)");
      sun.addColorStop(1, "rgba(255,255,240,0)");
      ctx.fillStyle = sun;
      ctx.beginPath();
      ctx.arc(sunX, sunY, 260, 0, Math.PI * 2);
      ctx.fill();

      // ---- OCEAN ----
      const ocean = ctx.createLinearGradient(0, h * 0.45, 0, h);
      ocean.addColorStop(0, horizonSky);
      ocean.addColorStop(1, deepOcean);
      ctx.fillStyle = ocean;
      ctx.fillRect(0, h * 0.45, w, h);

      // ---- WAVES ----
      ctx.strokeStyle = "rgba(255,255,255,0.35)";
      ctx.lineWidth = 1.2;

      let waveCount = 5;
      for (let i = 0; i < waveCount; i++) {
        let y = h * 0.55 + i * 50;
        ctx.beginPath();

        for (let x = 0; x < w; x++) {
          let wave = Math.sin((x * 0.008) + t * 2 + i) * (12 + i * 1.5);
          ctx.lineTo(x, y + wave);
        }
        ctx.stroke();
      }

      // ---- MOVEMENT LOOP ----
      requestAnimationFrame(draw);
    }

    draw();
  </script>
</body>
</html>
