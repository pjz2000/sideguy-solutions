<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>SideGuy Solutions | Pacific Stage 2</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #0094e8;
      font-family: system-ui, sans-serif;
    }

    /* ---------------------------
       🌅 SUN GLOW
    ----------------------------*/
    .sun {
      position: absolute;
      top: 18vh;
      left: 50%;
      width: 280px;
      height: 280px;
      margin-left: -140px;
      background: radial-gradient(
        circle,
        rgba(255,255,210,1) 0%,
        rgba(255,220,120,0.7) 40%,
        rgba(255,200,80,0.25) 60%,
        rgba(255,180,50,0.12) 80%,
        rgba(255,160,40,0.05) 100%
      );
      border-radius: 50%;
      filter: blur(12px);
      animation: sunPulse 12s ease-in-out infinite;
      z-index: 3;
    }

    @keyframes sunPulse {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.07); opacity: 1; }
    }

    /* ---------------------------
       🌊 OCEAN BASE
    ----------------------------*/
    .ocean {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 55vh;
      background: linear-gradient(#0094e8, #006bb3 45%, #004c80 100%);
      overflow: hidden;
      z-index: 2;
    }

    /* ---------------------------
       🌊 CSS WAVE LAYERS (Safe!)
    ----------------------------*/
    .wave {
      position: absolute;
      width: 200%;
      height: 220px;
      left: -50%;
      opacity: 0.38;
      background: rgba(255,255,255,0.55);
      filter: blur(8px);
      border-radius: 100%;
      animation: waveMove 8s linear infinite;
      transform: rotate(2deg);
    }

    .wave:nth-child(2) {
      bottom: 45px;
      opacity: 0.30;
      animation-duration: 11s;
    }

    .wave:nth-child(3) {
      bottom: 90px;
      opacity: 0.22;
      animation-duration: 15s;
    }

    @keyframes waveMove {
      0% { transform: translateX(0) rotate(2deg); }
      100% { transform: translateX(55%) rotate(2deg); }
    }

    /* ---------------------------
       TITLE LABEL
    ----------------------------*/
    #label {
      position: absolute;
      top: 18px;
      left: 18px;
      color: #dfffff;
      font-size: 14px;
      text-shadow: 0 0 8px #00334f;
      z-index: 10;
    }
  </style>
</head>

<body>

<div id="label">🌅 Pacific Stage-2 — Sun + Soft Waves (Stable)</div>

<div class="sun"></div>

<div class="ocean">
  <div class="wave"></div>
  <div class="wave"></div>
  <div class="wave"></div>
</div>

</body>
</html>
