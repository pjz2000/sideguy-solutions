<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SideGuy Solutions – Ocean Test Stage 2</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
      background: #0a3d62;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>

<body>
  <canvas id="ocean-canvas"></canvas>

  <!-- Three.js core -->
  <script src="https://unpkg.com/three@0.138.0/build/three.min.js"></script>

  <!-- Water + Sky helpers -->
  <script src="https://unpkg.com/three@0.138.0/examples/js/objects/Water.js"></script>
  <script src="https://unpkg.com/three@0.138.0/examples/js/objects/Sky.js"></script>

  <script>
    let camera, scene, renderer, water, sky, sun;
    let t = 0;

    init();
    animate();

    function init() {
      const canvas = document.getElementById("ocean-canvas");

      renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);

      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x77c9ff);  // bright pacific blue
      scene.fog = new THREE.FogExp2(0x77c9ff, 0.0009);

      camera = new THREE.PerspectiveCamera(
        60,
        window.innerWidth / window.innerHeight,
        1,
        20000
      );
      camera.position.set(0, 60, 170);

      sun = new THREE.Vector3();

      /* --- SKY --- */
      sky = new THREE.Sky();
      sky.scale.setScalar(10000);
      scene.add(sky);

      const skyU = sky.material.uniforms;
      skyU["turbidity"].value = 8;
      skyU["rayleigh"].value = 2.2;
      skyU["mieCoefficient"].value = 0.005;
      skyU["mieDirectionalG"].value = 0.75;

      updateSun();

      /* --- WATER --- */
      const waterGeometry = new THREE.PlaneGeometry(30000, 30000);

      const waterNormals = new THREE.TextureLoader().load(
        "https://threejs.org/examples/textures/waternormals.jpg",
        (texture) => {
          texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
        }
      );

      water = new THREE.Water(waterGeometry, {
        textureWidth: 2048,
        textureHeight: 2048,
        waterNormals: waterNormals,
        sunDirection: sun.clone().normalize(),
        sunColor: 0xffffff,
        waterColor: 0x1ca3ff,    // BLUER water tone
        distortionScale: 3.8,    // smoother waves
        fog: true,
      });

      water.rotation.x = -Math.PI / 2;
      scene.add(water);

      window.addEventListener("resize", onWindowResize);
    }

    function updateSun() {
      const phi = THREE.MathUtils.degToRad(60);
      const theta = THREE.MathUtils.degToRad(135);
      sun.setFromSphericalCoords(1, phi, theta);

      sky.material.uniforms["sunPosition"].value.copy(sun);
      if (water?.material?.uniforms?.sunDirection) {
        water.material.uniforms.sunDirection.value.copy(sun).normalize();
      }
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      requestAnimationFrame(animate);

      t += 0.003;

      if (water?.material?.uniforms?.time) {
        water.material.uniforms.time.value += 0.02;
      }

      // Gentle cinematic motion
      camera.position.x = Math.sin(t * 0.28) * 26;
      camera.position.y = 60 + Math.sin(t * 0.4) * 4;
      camera.position.z = 170 + Math.sin(t * 0.18) * 10;

      camera.lookAt(0, 0, 0);

      renderer.render(scene, camera);
    }
  </script>
</body>
</html>
