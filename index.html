<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>SideGuy Solutions | Ultra Pacific Engine</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #001a33;
  }

  #label {
    position: fixed;
    top: 20px;
    left: 20px;
    font-family: sans-serif;
    font-size: 15px;
    color: #bcecff;
    z-index: 10;
    text-shadow: 0 0 10px #000;
  }

  canvas { display: block; }
</style>
</head>

<body>
<div id="label">🌊 Ultra Pacific Engine v2.1 — PJ MODE</div>
<canvas id="ocean"></canvas>

<script src="https://unpkg.com/three@0.150.1/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.150.1/examples/js/objects/Water.js"></script>
<script src="https://unpkg.com/three@0.150.1/examples/js/objects/Sky.js"></script>

<script>
let camera, scene, renderer, water, sky, sun;

init();
animate();

function init() {
  const canvas = document.getElementById("ocean");

  renderer = new THREE.WebGLRenderer({
    canvas,
    antialias: true
  });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth / window.innerHeight,
    1,
    20000
  );
  camera.position.set(0, 55, 160);

  // Sky
  sun = new THREE.Vector3();

  sky = new THREE.Sky();
  sky.scale.setScalar(10000);
  scene.add(sky);

  const skyU = sky.material.uniforms;
  skyU["turbidity"].value = 11;
  skyU["rayleigh"].value = 3.1;
  skyU["mieCoefficient"].value = 0.0044;
  skyU["mieDirectionalG"].value = 0.78;

  updateSun();

  // Water
  const waterGeometry = new THREE.PlaneGeometry(30000, 30000);

  const waterNormals = new THREE.TextureLoader().load(
    "https://threejs.org/examples/textures/waternormals.jpg",
    function (texture) {
      texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
    }
  );

  water = new THREE.Water(waterGeometry, {
    textureWidth: 2048,
    textureHeight: 2048,
    waterNormals,
    sunDirection: sun,
    sunColor: 0xffffff,
    waterColor: 0x1477d4,
    distortionScale: 5.0,
    fog: false
  });

  water.rotation.x = -Math.PI / 2;
  scene.add(water);

  window.addEventListener("resize", onResize);
}

function updateSun() {
  const phi = THREE.MathUtils.degToRad(75);
  const theta = THREE.MathUtils.degToRad(160);
  sun.setFromSphericalCoords(1, phi, theta);

  sky.material.uniforms["sunPosition"].value.copy(sun);
  water.material.uniforms["sunDirection"].value.copy(sun).normalize();
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

let t = 0;

function animate() {
  requestAnimationFrame(animate);

  t += 0.0035;

  // Wave time
  water.material.uniforms["time"].value = t * 4.0;

  // Camera slow cinematic glide
  camera.position.x = Math.sin(t * 0.25) * 18;
  camera.position.y = 55 + Math.sin(t * 0.8) * 2.2;
  camera.position.z = 160 + Math.sin(t * 0.18) * 9;

  camera.lookAt(0, 0, 0);

  renderer.render(scene, camera);
}
</script>

</body>
</html>
