<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SideGuy Solutions | Where Code Meets the Coastline</title>

  <style>
    /* ------------------------------
       BASE
    ------------------------------ */
    html, body {
      margin: 0;
      padding: 0;
      font-family: system-ui, sans-serif;
      background: radial-gradient(circle at top, #0ea5e9 0%, #0f172a 50%, #020617 100%);
      color: #e0f2fe;
      min-height: 100vh;
      overflow-x: hidden;
      text-align: center;
    }

    h1 {
      font-size: 3rem;
      margin-top: 3rem;
      font-weight: 700;
      text-shadow: 0 12px 32px rgba(0,0,0,0.7);
    }

    p.sub {
      font-size: 1.2rem;
      max-width: 480px;
      margin: 1rem auto 2.5rem;
      opacity: 0.85;
    }

    /* ------------------------------
       FLOATING ORB
    ------------------------------ */
    .orb {
      width: 120px;
      height: 120px;
      border-radius: 999px;
      margin: 0 auto;
      cursor: pointer;
      background: radial-gradient(circle at 30% 20%, #ffffff, #bae6fd 40%, #38bdf8 60%, #0f172a 100%);
      box-shadow:
        0 0 25px rgba(56,189,248,0.9),
        0 0 70px rgba(15,23,42,0.95),
        inset 0 0 25px rgba(255,255,255,0.3);
      animation: float 4s ease-in-out infinite;
      position: relative;
    }

    .orb::after {
      content: "";
      position: absolute;
      inset: 18%;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.4);
      opacity: 0.8;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-14px); }
      100% { transform: translateY(0px); }
    }

    .orb-label {
      margin-top: 1rem;
      font-size: 1.1rem;
      letter-spacing: 0.02em;
      opacity: 0.9;
    }

    /* ------------------------------
       RIPPLE (Portal effect)
    ------------------------------ */
    body.ripple::before {
      content: "";
      position: fixed;
      left: 50%;
      top: 50%;
      width: 12vmax;
      height: 12vmax;
      border-radius: 999px;
      border: 2px solid rgba(56,189,248,0.6);
      transform: translate(-50%, -50%);
      animation: ripple 1.2s ease-out;
      pointer-events: none;
    }

    @keyframes ripple {
      0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(6); opacity: 0; }
    }

    /* ------------------------------
       BUTTON
    ------------------------------ */
    .cta {
      margin-top: 2.5rem;
      display: inline-block;
      padding: 0.75rem 1.4rem;
      border-radius: 999px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.25);
      color: #e0f2fe;
      text-decoration: none;
      transition: 200ms ease;
      backdrop-filter: blur(8px);
    }

    .cta:hover {
      background: rgba(255,255,255,0.2);
      transform: translateY(-2px);
    }

    footer {
      margin-top: 4rem;
      padding-bottom: 2rem;
      opacity: 0.6;
      font-size: 0.85rem;
    }
  </style>
</head>

<body>

  <h1>SideGuy Solutions</h1>
  <p class="sub">Your North County coastal concierge for apps, AI, tickets, DFS edges, and Web3.</p>

  <!-- ORB -->
  <div class="orb" id="orb"></div>
  <div class="orb-label">Tap to Summon PJ</div>

  <a class="cta" href="mailto:pj@sideguysolutions.com">Or email PJ directly</a>

  <footer>
    © <span id="year"></span> SideGuy Solutions · Where code meets the coastline
  </footer>

<script>
  // Ripple + email
  document.getElementById("orb").addEventListener("click", () => {
    document.body.classList.add("ripple");
    setTimeout(() => {
      window.location.href =
        "mailto:pj@sideguysolutions.com?subject=Summon%20PJ&body=Hey%20PJ%2C%20I%20tapped%20the%20orb.";
    }, 420);
    setTimeout(() => {
      document.body.classList.remove("ripple");
    }, 1400);
  });

  // Footer year
  document.getElementById("year").textContent = new Date().getFullYear();
</script>

</body>
</html>
