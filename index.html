<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ocean Test</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #020617;
      height: 100%;
    }

    #ocean {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 1;
    }
  </style>

  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
</head>

<body>
  <canvas id="ocean"></canvas>

  <script>
    // -------- Initialization --------
    let scene, camera, renderer, mesh, uniforms;

    const vertexShader = `
      varying vec2 vUv;
      uniform float time;

      void main() {
        vUv = uv;
        vec3 pos = position;

        float wave1 = sin(pos.x * 0.4 + time * 0.4) * 0.15;
        float wave2 = cos(pos.y * 0.3 + time * 0.3) * 0.1;

        pos.z += wave1 + wave2;

        gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
      }
    `;

    const fragmentShader = `
      precision highp float;
      varying vec2 vUv;
      uniform float time;

      void main() {
        float shade = 0.5 + 0.5 * sin(vUv.y * 6.0 + time * 1.2);
        vec3 deep = vec3(0.01, 0.08, 0.18);
        vec3 shallow = vec3(0.0, 0.5, 1.0);
        vec3 color = mix(deep, shallow, shade);

        gl_FragColor = vec4(color, 1.0);
      }
    `;

    function init() {
      const canvas = document.getElementById("ocean");

      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(
        55,
        window.innerWidth / window.innerHeight,
        0.1,
        100
      );
      camera.position.set(0, 1.2, 2.2);
      camera.lookAt(0, 0, 0);

      renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);

      const geo = new THREE.PlaneGeometry(6, 6, 100, 100);

      uniforms = {
        time: { value: 0 }
      };

      const mat = new THREE.ShaderMaterial({
        vertexShader,
        fragmentShader,
        uniforms,
        side: THREE.DoubleSide
      });

      mesh = new THREE.Mesh(geo, mat);
      mesh.rotation.x = -Math.PI / 2.2;
      mesh.position.y = -1;
      scene.add(mesh);

      window.addEventListener("resize", onResize);
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate(t) {
      requestAnimationFrame(animate);
      uniforms.time.value = t * 0.001;

      camera.position.x = Math.sin(t * 0.0003) * 0.3;
      camera.lookAt(0, 0, 0);

      renderer.render(scene, camera);
    }

    init();
    animate();
  </script>
</body>
</html>
