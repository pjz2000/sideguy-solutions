<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>SideGuy Solutions | Crystal Blue Ocean</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    height: 100%;
    background: #002544;
  }

  #ocean-canvas {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
  }

  #label {
    position: fixed;
    top: 20px;
    left: 20px;
    font-family: sans-serif;
    color: #a7e6ff;
    font-size: 14px;
    z-index: 10;
    text-shadow: 0 0 6px #000;
  }
</style>
</head>

<body>

<div id="label">🌊 SideGuy Ocean — Crystal Blue V1</div>
<canvas id="ocean-canvas"></canvas>

<script src="https://unpkg.com/three@0.138.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.138.0/examples/js/objects/Water.js"></script>
<script src="https://unpkg.com/three@0.138.0/examples/js/objects/Sky.js"></script>

<script>
let camera, scene, renderer, water, sky, sun;
let camTime = 0;
let camSpeed = 0.00035;

init();
animate();

function init() {
  const canvas = document.getElementById("ocean-canvas");

  renderer = new THREE.WebGLRenderer({
    canvas,
    antialias: true,
    powerPreference: "high-performance"
  });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);

  /* SCENE + CINEMATIC FOG */
  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x5599cc, 0.0018);

  /* CAMERA */
  camera = new THREE.PerspectiveCamera(
    65,
    window.innerWidth / window.innerHeight,
    1,
    20000
  );
  camera.position.set(0, 65, 165);

  /* SUN */
  sun = new THREE.Vector3();

  /* SKY — brighter, bluer, crystal */
  sky = new THREE.Sky();
  sky.scale.setScalar(10000);
  scene.add(sky);

  const skyU = sky.material.uniforms;
  skyU["turbidity"].value = 10;
  skyU["rayleigh"].value = 3.0;   // brighter blue
  skyU["mieCoefficient"].value = 0.005;
  skyU["mieDirectionalG"].value = 0.85;

  updateSun();

  /* WATER — CRYSTAL BLUE EDITION */
  const waterGeometry = new THREE.PlaneGeometry(20000, 20000);

  const waterNormals = new THREE.TextureLoader().load(
    "https://threejs.org/examples/textures/waternormals.jpg",
    (tex) => {
      tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    }
  );

  water = new THREE.Water(waterGeometry, {
    textureWidth: 2048,
    textureHeight: 2048,
    waterNormals,
    sunDirection: sun,
    sunColor: 0xffffff,
    waterColor: 0x2bb7ff,  // 💙 CRYSTAL TROPICAL BLUE
    distortionScale: 5.5,  // more detail
    fog: true
  });

  water.rotation.x = -Math.PI / 2;
  scene.add(water);

  window.addEventListener("resize", onWindowResize);
}

/* SUN UPDATE */
function updateSun() {
  const phi = THREE.MathUtils.degToRad(88);
  const theta = THREE.MathUtils.degToRad(180);

  sun.setFromSphericalCoords(1, phi, theta);

  sky.material.uniforms["sunPosition"].value.copy(sun);

  if (water) {
    water.material.uniforms.sunDirection.value
      .set(sun.x, sun.y, sun.z)
      .normalize();
  }
}

/* RESIZE */
function onWindowResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
}

/* ANIMATION */
function animate() {
  requestAnimationFrame(animate);

  water.material.uniforms["time"].value += 0.8 / 60.0;

  camTime += camSpeed;
  camera.position.y = 65 + Math.sin(camTime * 1.5) * 1.8;
  camera.position.z = 165 + Math.sin(camTime * 0.35) * 8;
  camera.position.x = Math.sin(camTime * 0.25) * 12;
  camera.lookAt(0, 0, 0);

  renderer.render(scene, camera);
}
</script>

</body>
</html>
