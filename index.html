<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SideGuy Solutions | Movie Ocean Test v2</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #020617;
      font-family: system-ui, -apple-system, Inter, sans-serif;
      color: #e2e8f0;
    }

    #bg3d {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .overlay {
      position: relative;
      z-index: 10;
      height: 100%;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      text-align: center;
    }

    .box {
      max-width: 700px;
      padding: 2rem 2.3rem;
      border-radius: 1.4rem;
      background: rgba(15, 23, 42, 0.55);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 26px 70px rgba(0,0,0,0.6);
    }

    h1 {
      font-size: clamp(2rem, 4vw, 3.1rem);
      color: #f9fafb;
      margin-bottom: 1rem;
    }

    p {
      color: #dbeafe;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    .contact {
      color: #bae6fd;
      margin-bottom: 1.5rem;
    }

    button {
      padding: 0.85rem 1.7rem;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      background: linear-gradient(120deg, #22d3ee, #3b82f6);
      color: white;
      font-size: .95rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
    }
  </style>
</head>

<body>

<div id="bg3d"></div>

<div class="overlay">
  <div class="box">
    <h1>Where San Diego builds, codes, and scales.</h1>

    <p>
      Coastal concierge tech for the 2025 era — custom apps, AI automation,
      Web3 & Solana payments, ticketing flows, and DFS tools tuned for North County and greater San Diego.
    </p>

    <div class="contact">
      Text / call: <strong>773–544–1231</strong><br />
      Email: <strong>peter.z@kromeon.com</strong>
    </div>

    <button id="summonPJ">TAP TO SUMMON PJ</button>
  </div>
</div>

<!-- Stable Three.js (NO MODULES) -->
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
  let scene, camera, renderer, ocean;

  function init() {
    const container = document.getElementById("bg3d");

    scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x020617, 8, 60);

    camera = new THREE.PerspectiveCamera(
      55,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 6, 22);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x020617, 1);
    container.appendChild(renderer.domElement);

    // LIGHTING (movie-like sun + fill)
    const mainLight = new THREE.DirectionalLight(0xffffff, 1.35);
    mainLight.position.set(-10, 18, 15);
    scene.add(mainLight);

    const fillLight = new THREE.HemisphereLight(0x0b1b2f, 0x020617, 0.8);
    scene.add(fillLight);

    // OCEAN GEOMETRY — smooth rolling waves (Option B)
    const geo = new THREE.PlaneGeometry(300, 300, 240, 240);
    geo.rotateX(-Math.PI / 2);

    const mat = new THREE.MeshStandardMaterial({
      color: new THREE.Color("#0f2e4d"), // deep movie blue
      metalness: 0.45,
      roughness: 0.38,
    });

    ocean = new THREE.Mesh(geo, mat);
    scene.add(ocean);

    window.addEventListener("resize", onResize);
    animate();
  }

  function animate() {
    requestAnimationFrame(animate);

    const t = performance.now() * 0.00035;
    const pos = ocean.geometry.attributes.position;

    // Smooth rolling waves + detail layer
    for (let i = 0; i < pos.count; i++) {
      const x = pos.getX(i);
      const z = pos.getZ(i);

      const y1 = Math.sin(x * 0.04 + t * 2.1) * 0.6;
      const y2 = Math.cos(z * 0.07 + t * 1.9) * 0.3; // added detail

      pos.setY(i, y1 + y2);
    }

    pos.needsUpdate = true;

    camera.lookAt(0, 0, 0);
    renderer.render(scene, camera);
  }

  function onResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  }

  // Summon PJ button
  document.getElementById("summonPJ").onclick = () => {
    window.location.href =
      "mailto:peter.z@kromeon.com?subject=Summon%20PJ%20%F0%9F%8C%8A";
  };

  init();
</script>

</body>
</html>
