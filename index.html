<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>SideGuy Solutions | Ocean Reset</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #0b4f9c;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    /* Full-screen “ocean” background */
    .ocean-bg {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: radial-gradient(circle at top,
        #5fd5ff 0%,
        #1f8ed9 30%,
        #0b4f9c 65%,
        #042a55 100%
      );
    }

    /* Small debug label so we always know what build we're on */
    .label {
      position: fixed;
      top: 16px;
      left: 16px;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      color: #d9f4ff;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(10px);
      text-shadow: 0 0 6px rgba(0, 0, 0, 0.9);
      z-index: 10;
    }

    /* Center helper if we want to test text later */
    .center-test {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e8f9ff;
      font-size: 1.1rem;
      text-shadow: 0 0 10px rgba(0, 0, 0, 0.85);
      pointer-events: none;
    }
  </style>
</head>

<body>
  <!-- Fullscreen bright blue ocean gradient (static, no animation) -->
  <div class="ocean-bg"></div>

  <!-- Debug label so we always know it's the safe reset build -->
  <div class="label">
    🌊 Stage-1 Ocean Reset · Static · No JS
  </div>

  <!-- Optional center text (you can remove this once you confirm it works) -->
  <div class="center-test">
    Ocean Reset Loaded – If you see this, the base is STABLE ✅
  </div>
</body>
</html>
