<!DOCTYPE html>

  <meta charset="UTF-8" />

  <style>
    :root {
      --bg: #020617;

    .ocean-overlay {

    header {
      position: sticky;
      top: 0;

      padding: 16px 24px;

    nav a {

    .hero p {
      max-width: 580px;
      color: var(--muted);
      font-size: 1.05rem;

      margin-bottom: 20px;
    }

    .hero button {
      background: linear-gradient(135deg, #e0f2fe, #38bdf8);
      padding: 12px 22px;
      border-radius: 999px;
      border: none;
      cursor: pointer;

    footer {

<body>

  <!-- THREE.js -->
  <script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>

  <script>
    // ===== SUMMON LOGIC =====
    document.getElementById("summon").onclick = () => {
      Math.random() < 0.6
        ? window.location.href = "sms:17735441231"

    };

    // ===== REAL PACIFIC OCEAN SHADER (OG PERFECT VERSION) =====
    let scene, camera, renderer, material, ocean;

    function initOcean() {
      const canvas = document.getElementById("ocean-canvas");

      renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(2, window.devicePixelRatio));

      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 80);
      camera.position.set(0, 2.2, 4.0);

      const geo = new THREE.PlaneGeometry(12, 8, 220, 160);
      geo.rotateX(-Math.PI / 2.1);

      material = new THREE.ShaderMaterial({
        uniforms: { uTime: { value: 0 } },
        vertexShader: `
          varying vec2 vUv;
          uniform float uTime;
          void main() {
            vUv = uv;
            vec3 p = position;

            float t = uTime;

            p.y += sin(p.x * 0.6 + t * 0.8) * 0.18;
            p.y += sin(p.z * 1.2 - t * 0.6) * 0.14;
            p.y += sin((p.x + p.z) * 0.4 + t * 0.9) * 0.12;

            gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0);
          }
        `,
        fragmentShader: `
          varying vec2 vUv;
          uniform float uTime;

          void main() {
            float y = vUv.y;
            vec3 deep = vec3(0.01,0.05,0.12);
            vec3 mid = vec3(0.0,0.3,0.55);

            float mixv = smoothstep(0.0, 1.0, y);
            vec3 col = mix(deep, mid, mixv);

            col += 0.04 * sin((vUv.x + vUv.y + uTime * 0.3) * 16.0);

            gl_FragColor = vec4(col, 1.0);
          }
        `
      });

      ocean = new THREE.Mesh(geo, material);
      scene.add(ocean);

      animateOcean();
    }

    function animateOcean() {
      requestAnimationFrame(animateOcean);
      material.uniforms.uTime.value += 0.015;

      camera.position.x = Math.sin(material.uniforms.uTime.value * 0.18) * 0.34;
      camera.lookAt(0, 0, 0);

      renderer.render(scene, camera);
    }

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    initOcean();
  </script>
