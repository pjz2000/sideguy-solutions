  <!-- Ocean + Orb Logic -->
  <script>
    // ------------------------------
    // REAL OCEAN SHADER BACKGROUND
    // ------------------------------
    let oceanRenderer, oceanScene, oceanCamera, oceanMaterial;
    let targetWaveAmp = 0.12;

    function initOcean() {
      const canvas = document.getElementById("ocean-canvas");
      if (!canvas || !window.THREE) return;

      oceanRenderer = new THREE.WebGLRenderer({
        canvas,
        antialias: true,
      });
      oceanRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      oceanRenderer.setSize(window.innerWidth, window.innerHeight);

      oceanScene = new THREE.Scene();

      const fov = 55;
      const aspect = window.innerWidth / window.innerHeight;
      oceanCamera = new THREE.PerspectiveCamera(fov, aspect, 0.1, 50);
      oceanCamera.position.set(0, 1.25, 1.8);
      oceanCamera.lookAt(0, 0, 0);

      const geometry = new THREE.PlaneGeometry(8, 6, 180, 120);
      const uniforms = {
        uTime: { value: 0 },
        uWaveAmp: { value: targetWaveAmp },
      };

      const vertexShader = `
        uniform float uTime;
        uniform float uWaveAmp;
        varying vec2 vUv;

        void main() {
          vUv = uv;
          vec3 pos = position;

          float wave1 = sin(pos.x * 3.5 + uTime * 1.2) * uWaveAmp;
          float wave2 = sin(pos.y * 2.7 - uTime * 1.6) * (uWaveAmp * 0.8);
          float wave3 = sin((pos.x + pos.y) * 4.0 + uTime * 0.9) * (uWaveAmp * 0.6);

          pos.z += wave1 + wave2 + wave3;

          gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
        }
      `;

      const fragmentShader = `
        uniform float uTime;
        varying vec2 vUv;

        void main() {
          vec3 deep = vec3(0.01, 0.07, 0.16);
          vec3 mid = vec3(0.0, 0.28, 0.45);
          vec3 shallow = vec3(0.1, 0.55, 0.65);

          float t1 = sin((vUv.x + uTime * 0.05) * 9.0) * 0.02;
          float t2 = sin((vUv.y - uTime * 0.07) * 13.0) * 0.02;
          float mixVal = clamp(vUv.y + (t1 + t2) * 2.2, 0.0, 1.0);

          vec3 color = mix(deep, mid, mixVal);
          color = mix(color, shallow, smoothstep(0.55, 1.1, mixVal));

          float foam = smoothstep(0.7, 0.98, mixVal + sin(uTime * 0.4) * 0.05);
          foam += smoothstep(0.78, 0.98, mixVal + sin((vUv.x * 6.0) + uTime * 0.6) * 0.04);
          foam = clamp(foam, 0.0, 1.0);

          vec3 foamColor = vec3(0.88, 0.97, 0.99);
          color = mix(color, foamColor, foam * 0.7);

          color += vec3(0.02, 0.05, 0.08) * (1.0 - vUv.y);

          gl_FragColor = vec4(color, 1.0);
        }
      `;

      oceanMaterial = new THREE.ShaderMaterial({
        uniforms,
        vertexShader,
        fragmentShader,
        side: THREE.DoubleSide,
      });

      const plane = new THREE.Mesh(geometry, oceanMaterial);
      plane.rotation.x = -Math.PI / 2.2;
      plane.position.set(0, -0.6, 0);
      oceanScene.add(plane);

      window.addEventListener("resize", onWindowResize);
      requestAnimationFrame(animateOcean);
    }

    function onWindowResize() {
      if (!oceanRenderer || !oceanCamera) return;
      const w = window.innerWidth;
      const h = window.innerHeight;
      oceanCamera.aspect = w / h;
      oceanCamera.updateProjectionMatrix();
      oceanRenderer.setSize(w, h);
    }

    function animateOcean(time) {
      if (!oceanRenderer || !oceanScene || !oceanCamera || !oceanMaterial) return;

      const t = (time || 0) * 0.001;
      oceanMaterial.uniforms.uTime.value = t;
      oceanMaterial.uniforms.uWaveAmp.value +=
        (targetWaveAmp - oceanMaterial.uniforms.uWaveAmp.value) * 0.05;

      const driftRadius = 0.25;
      oceanCamera.position.x = Math.sin(t * 0.18) * driftRadius;
      oceanCamera.position.z = 1.6 + Math.cos(t * 0.14) * 0.12;
      oceanCamera.lookAt(0, -0.35, 0);

      oceanRenderer.render(oceanScene, oceanCamera);
      requestAnimationFrame(animateOcean);
    }

    function boostWaves() {
      targetWaveAmp = 0.32;
      document.body.classList.add("portal-flash", "portal-ripple", "portal-open");

      setTimeout(() => {
        targetWaveAmp = 0.12;
        document.body.classList.remove("portal-flash");
      }, 620);

      setTimeout(() => {
        document.body.classList.remove("portal-ripple");
      }, 1500);
    }

    function playOceanAudio() {
      const audio = document.getElementById("ocean-audio");
      if (!audio) return;
      audio.volume = 0.55;
      const p = audio.play();
      if (p && p.catch) p.catch(() => {});
    }

    function initOrb() {
      const orb = document.getElementById("summon-orb");
      if (!orb) return;

      orb.addEventListener("click", () => {
        boostWaves();
        playOceanAudio();

        setTimeout(() => {
          window.location.href =
            "mailto:pj@sideguysolutions.com" +
            "?subject=" +
            encodeURIComponent("Summon PJ via SideGuy portal") +
            "&body=" +
            encodeURIComponent(
              "Hey PJ,\n\nI tapped the orb on SideGuy Solutions.\n\nI’m looking for help with:\n\n" +
              "- Tech / app build:\n" +
              "- Tickets / events:\n" +
              "- Sports edge / DFS:\n" +
              "- Stablecoin / escrow:\n" +
              "- Something else entirely:\n\n" +
              "Talk soon.\n"
            );
        }, 420);
      });
    }

    function updateVersionStamp() {
      const el = document.getElementById("version-stamp");
      const yearEl = document.getElementById("footer-year");
      const year = new Date().getFullYear();
      if (el) el.textContent = "v5.0 · Real Ocean Orb · " + year;
      if (yearEl) yearEl.textContent = year;
    }

    document.addEventListener("DOMContentLoaded", () => {
      setTimeout(initOcean, 140);
      initOrb();
      updateVersionStamp();
    });
  </script>
