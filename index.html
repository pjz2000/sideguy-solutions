<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal Dynamic Gradient Background</title>
    <style>
        /* 1. Reset and Full Viewport Setup */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        /* 2. The Animated Gradient Layer */
        .animated-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; 
            
            /* --- Gradient Setup --- */
            background: linear-gradient(135deg, #001f3f, #ff8c00, #ff4500, #4682b4, #ff69b4);
            /* Make the gradient area much larger than the screen to allow for movement */
            background-size: 400% 400%; 
            
            /* --- Movement Animation --- */
            /* 45 seconds duration, continuous loop, cubic-bezier for a smooth, wave-like feel */
            animation: colorShift 45s ease infinite; 
        }

        /* 3. Define the Movement (Shifting the Gradient Position) */
        @keyframes colorShift {
            0% {
                background-position: 0% 50%; /* Start colors from the left */
            }
            50% {
                background-position: 100% 50%; /* Shift colors fully to the right */
            }
            100% {
                background-position: 0% 50%; /* Return to the start */
            }
        }

        /* 4. Content Styles (to ensure contrast and visibility) */
        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            padding-top: 200px;
            height: 100vh;
            color: #ffffff; /* White text for great contrast */
            /* Add a subtle shadow to text to make it pop over the shifting colors */
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7); 
        }
    </style>
</head>
<body>
    <div class="animated-background"></div>
    <div class="content">
        <h1>Beautiful Dynamic Background is Now Working!</h1>
        <p>This sunset-themed gradient smoothly moves across the screen.</p>
        <p>Your website content goes here.</p>
    </div>
</body>
</html>
