<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SideGuy Solutions | Pacific Engine</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #020617;
    font-family: Inter, sans-serif;
  }
  #ocean {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
  }
</style>
</head>

<body>
<canvas id="ocean"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ===== OCEAN ENGINE VΩ (OMEGA) =====
let scene, camera, renderer, oceanMesh, clock;

init();
animate();

function init() {
  const canvas = document.getElementById("ocean");

  renderer = new THREE.WebGLRenderer({
    canvas,
    antialias: true
  });
  renderer.setPixelRatio(Math.min(2, window.devicePixelRatio));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x020617, 1);

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth / window.innerHeight,
    0.1,
    200
  );
  camera.position.set(0, 2.8, 7);
  camera.lookAt(0, 0, 0);

  clock = new THREE.Clock();

  const geometry = new THREE.PlaneGeometry(200, 200, 400, 400);

  const uniforms = {
    uTime: { value: 0 },
    uSunDir: { value: new THREE.Vector3(0.3, 1.0, 0.6).normalize() }
  };

  const vertexShader = `
    uniform float uTime;
    varying vec3 vPos;
    varying vec3 vNormal;
    varying vec2 vUv;

    // Perlin-like noise
    float hash(vec2 p) {
      return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123);
    }

    float noise(vec2 p){
      vec2 i = floor(p);
      vec2 f = fract(p);

      float a = hash(i);
      float b = hash(i + vec2(1.0, 0.0));
      float c = hash(i + vec2(0.0, 1.0));
      float d = hash(i + vec2(1.0, 1.0));

      vec2 u = f * f * (3.0 - 2.0 * f);

      return mix(a, b, u.x) +
             (c - a) * u.y * (1.0 - u.x) +
             (d - b) * u.x * u.y;
    }

    void main() {
      vUv = uv;
      vec3 pos = position;

      float t = uTime * 0.2;

      // LARGE swells
      float swell = sin(pos.x * 0.07 + t * 0.6) * 0.9;
      swell += cos(pos.y * 0.06 + t * 0.8) * 0.8;

      // MID waves
      float mid = sin(pos.x * 0.22 + t * 1.6) * 0.25;
      mid += cos(pos.y * 0.18 + t * 1.1) * 0.22;

      // DETAIL noise ripples
      float ripple = noise(pos.xz * 1.2 + t * 0.7) * 0.18;

      pos.z = swell + mid + ripple;

      vPos = pos;

      // Approx normal
      vNormal = normalize(vec3(
        -dFdx(pos.z),
        1.0,
        -dFdy(pos.z)
      ));

      gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
    }
  `;

  const fragmentShader = `
    varying vec3 vPos;
    varying vec3 vNormal;
    varying vec2 vUv;

    uniform vec3 uSunDir;

    void main() {
      vec3 deep = vec3(0.01, 0.07, 0.15);
      vec3 mid  = vec3(0.02, 0.32, 0.55);
      vec3 top  = vec3(0.1,  0.72, 0.85);

      float height = smoothstep(-1.5, 1.8, vPos.z);
      vec3 color = mix(deep, mid, height);

      // Fresnel
      float fres = pow(1.0 - max(dot(vNormal, vec3(0,1,0)), 0.0), 3.0);
      color = mix(color, top, fres * 0.85);

      // Sun highlight
      float sun = max(dot(vNormal, normalize(uSunDir)), 0.0);
      color += vec3(1.0, 0.95, 0.85) * pow(sun, 28.0) * 0.7;

      // Subtle vignette
      float vignette = smoothstep(0.9, 0.3, length(vUv - 0.5));
      color *= vignette + 0.15;

      gl_FragColor = vec4(color, 1.0);
    }
  `;

  const material = new THREE.ShaderMaterial({
    uniforms,
    vertexShader,
    fragmentShader,
    side: THREE.DoubleSide
  });

  oceanMesh = new THREE.Mesh(geometry, material);
  oceanMesh.rotation.x = -Math.PI / 2;
  oceanMesh.position.y = -1.2;
  scene.add(oceanMesh);

  window.addEventListener("resize", onResize);
}

function animate() {
  requestAnimationFrame(animate);

  let t = clock.getElapsedTime();
  oceanMesh.material.uniforms.uTime.value = t;

  camera.position.x = Math.sin(t * 0.1) * 1.2;
  camera.position.z = 7 + Math.cos(t * 0.08) * 1.6;
  camera.lookAt(0, 0, 0);

  renderer.render(scene, camera);
}

function onResize() {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
}
</script>

</body>
</html>
