<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>SideGuy Solutions | Deep Sapphire Ocean</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    height: 100%;
    background: #001024; /* deep fallback */
  }

  #ocean-canvas {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
  }

  #label {
    position: fixed;
    top: 20px;
    left: 20px;
    font-family: sans-serif;
    color: #97d9ff;
    font-size: 14px;
    z-index: 10;
    text-shadow: 0 0 6px #000;
  }
</style>
</head>

<body>

<div id="label">💎 SideGuy Ocean — Deep Sapphire V1</div>
<canvas id="ocean-canvas"></canvas>

<!-- Three.js -->
<script src="https://unpkg.com/three@0.138.0/build/three.min.js"></script>

<!-- Water + Sky -->
<script src="https://unpkg.com/three@0.138.0/examples/js/objects/Water.js"></script>
<script src="https://unpkg.com/three@0.138.0/examples/js/objects/Sky.js"></script>

<script>
let camera, scene, renderer, water, sky, sun;
let camTime = 0;
let camSpeed = 0.00035;

init();
animate();

function init() {
  const canvas = document.getElementById("ocean-canvas");

  renderer = new THREE.WebGLRenderer({
    canvas,
    antialias: true,
    powerPreference: "high-performance"
  });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);

  /* SCENE + CINEMATIC FOG (Deep Sapphire tuning) */
  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x0b1e3d, 0.0022); 
  // darker fog for sapphire tone

  /* CAMERA */
  camera = new THREE.PerspectiveCamera(
    65,
    window.innerWidth / window.innerHeight,
    1,
    20000
  );
  camera.position.set(0, 65, 165);

  /* SUN SETUP */
  sun = new THREE.Vector3();

  /* SKY — Sapphire Edition */
  sky = new THREE.Sky();
  sky.scale.setScalar(10000);
  scene.add(sky);

  const skyU = sky.material.uniforms;
  skyU["turbidity"].value = 8;
  skyU["rayleigh"].value = 1.8;   // deeper blue sky
  skyU["mieCoefficient"].value = 0.005;
  skyU["mieDirectionalG"].value = 0.85;

  updateSun();

  /* WATER — DEEP SAPPHIRE MODE */
  const waterGeometry = new THREE.PlaneGeometry(20000, 20000);

  const waterNormals = new THREE.TextureLoader().load(
    "https://threejs.org/examples/textures/waternormals.jpg",
    (tex) => {
      tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    }
  );

  water = new THREE.Water(waterGeometry, {
    textureWidth: 2048,
    textureHeight: 2048,
    waterNormals,
    sunDirection: sun,
    sunColor: 0xffffff,
    waterColor: 0x003d8f,  // 💎 DEEP SAPPHIRE
    distortionScale: 4.8,  // tuned for clarity
    fog: true
  });

  water.rotation.x = -Math.PI / 2;
  scene.add(water);

  window.addEventListener("resize", onWindowResize);
}

/* SUN UPDATE */
function updateSun() {
  // slightly lower sun angle = warmer soft highlight
  const phi = THREE.MathUtils.degToRad(70);
  const theta = THREE.MathUtils.degToRad(160);

  sun.setFromSphericalCoords(1, phi, theta);

  sky.material.uniforms["sunPosition"].value.copy(sun);

  if (water) {
    water.material.uniforms.sunDirection.value
      .set(sun.x, sun.y, sun.z)
      .normalize();
  }
}

/* RESIZE HANDLER */
function onWindowResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
}

/* ANIMATION LOOP */
function animate() {
  requestAnimationFrame(animate);

  // more subtle wave motion for sapphire
  water.material.uniforms["time"].value += 0.6 / 60.0;

  // smooth camera drift
  camTime += camSpeed;
  camera.position.y = 65 + Math.sin(camTime * 1.4) * 1.3;
  camera.position.z = 165 + Math.sin(camTime * 0.28) * 6;
  camera.position.x = Math.sin(camTime * 0.22) * 10;
  camera.lookAt(0, 0, 0);

  renderer.render(scene, camera);
}
</script>

</body>
</html>
