<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>SideGuy Solutions | Crystal Blue Pacific Cinematic</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    height: 100%;
    background: #00223a;
  }

  #ocean-canvas {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    z-index: 0;
  }

  #label {
    position: fixed;
    top: 20px;
    left: 20px;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    color: #bcecff;
    font-size: 14px;
    z-index: 30;
    text-shadow: 0 0 8px #000;
    opacity: 0.85;
  }

  /* VIGNETTE (softened for sun) */
  #vignette {
    position: fixed;
    inset: 0;
    z-index: 5;
    pointer-events: none;
    background:
      radial-gradient(circle at 50% 30%, rgba(0, 0, 0, 0.0) 0%, rgba(0, 0, 0, 0.15) 60%, rgba(0, 0, 0, 0.35) 100%);
    mix-blend-mode: multiply;
  }

  /* SPARKLE / CAUSTIC FX */
  #fx-layer {
    position: fixed;
    inset: 0;
    z-index: 4;
    pointer-events: none;
    mix-blend-mode: screen;
    opacity: 0.35;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(255,255,255,0.22) 0, rgba(255,255,255,0) 40%),
      radial-gradient(circle at 80% 60%, rgba(255,255,255,0.18) 0, rgba(255,255,255,0) 45%),
      radial-gradient(circle at 50% 90%, rgba(255,255,255,0.15) 0, rgba(255,255,255,0) 40%);
    background-size: 140% 140%;
    animation: sparkleDrift 18s linear infinite;
  }

  @keyframes sparkleDrift {
    0% { background-position: 0% 0%; opacity: 0.25; }
    50% { background-position: 30% 50%; opacity: 0.45; }
    100% { background-position: 0% 0%; opacity: 0.25; }
  }

  /* UI */
  #ui {
    position: fixed;
    inset: 0;
    z-index: 20;
    pointer-events: none;
    display: flex;
    justify-content: center;
    padding: 24px;
  }

  .ui-inner {
    max-width: 960px;
    width: 100%;
    text-align: center;
    color: #e5f7ff;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    text-shadow: 0 6px 18px rgba(0,0,0,0.85);
    margin-top: 12vh;
    animation: fadeUp 1.3s ease-out forwards;
    opacity: 0;
    transform: translateY(16px);
    pointer-events: none;
  }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .hero-badge {
    display: inline-flex;
    padding: 6px 12px;
    border-radius: 999px;
    background: rgba(5, 24, 45, 0.7);
    border: 1px solid rgba(148, 227, 255, 0.3);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #9bdcff;
    margin-bottom: 16px;
    pointer-events: none;
  }

  .hero-title {
    font-size: clamp(32px, 5vw, 48px);
    font-weight: 700;
    margin: 0 0 8px 0;
  }

  .hero-sub {
    font-size: clamp(15px, 2vw, 18px);
    margin: 0 0 6px 0;
  }

  .hero-sub-2 {
    font-size: clamp(13px, 1.8vw, 16px);
    margin: 0 0 24px 0;
    color: #a8d8f4;
  }

  .hero-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    pointer-events: auto;
  }

  .btn-primary {
    padding: 12px 24px;
    border-radius: 999px;
    background: radial-gradient(circle at 0% 0%, #38bdf8 0%, #0ea5e9 50%, #0369a1 100%);
    border: none;
    color: #e0faff;
    font-weight: 600;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    box-shadow: 0 10px 25px rgba(15,118,178,0.9);
    transition: 0.18s ease-out;
  }

  .btn-primary:hover {
    transform: translateY(-1px) scale(1.02);
    filter: brightness(1.1);
  }

  .btn-ghost {
    padding: 11px 20px;
    border-radius: 999px;
    border: 1px solid rgba(148, 227, 255, 0.4);
    background: rgba(15,23,42,0.4);
    color: #c9e8ff;
    font-size: 13px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    transition: 0.18s ease-out;
  }

  .btn-ghost:hover {
    border-color: #e3faff;
    background: rgba(15,23,42,0.7);
  }
</style>
</head>

<body>

<div id="label">☀️ Sun Fixed — Crystal Blue Pacific</div>

<canvas id="ocean-canvas"></canvas>
<div id="fx-layer"></div>
<div id="vignette"></div>

<div id="ui">
  <div class="ui-inner">
    <div class="hero-badge">San Diego · North County</div>

    <h1 class="hero-title">SideGuy Solutions</h1>

    <p class="hero-sub">Where code meets the coastline.</p>
    <p class="hero-sub-2">Coastal tech concierge for apps, AI, Web3 & smarter systems.</p>

    <div class="hero-actions">
      <button class="btn-primary">Tap to Summon PJ</button>
      <button class="btn-ghost">View Coastal Playbook</button>
    </div>
  </div>
</div>

<!-- Three.js -->
<script src="https://unpkg.com/three@0.138.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.138.0/examples/js/objects/Water.js"></script>
<script src="https://unpkg.com/three@0.138.0/examples/js/objects/Sky.js"></script>

<script>
let camera, scene, renderer, water, sky, sun;
let camTime = 0;
let camSpeed = 0.00033;

init();
animate();

function init() {
  const canvas = document.getElementById("ocean-canvas");

  renderer = new THREE.WebGLRenderer({
    canvas,
    antialias: true,
    powerPreference: "high-performance"
  });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);

  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x1d3b55, 0.0019);

  camera = new THREE.PerspectiveCamera(65, window.innerWidth/window.innerHeight, 1, 20000);
  camera.position.set(0, 65, 165);

  sun = new THREE.Vector3();

  sky = new THREE.Sky();
  sky.scale.setScalar(10000);
  scene.add(sky);

  const skyU = sky.material.uniforms;
  skyU["turbidity"].value = 6;
  skyU["rayleigh"].value = 3.4;
  skyU["mieCoefficient"].value = 0.003;
  skyU["mieDirectionalG"].value = 0.78;

  updateSun();

  const waterGeometry = new THREE.PlaneGeometry(30000, 30000);
  const waterNormals = new THREE.TextureLoader().load(
    "https://threejs.org/examples/textures/waternormals.jpg",
    (tex) => { tex.wrapS = tex.wrapT = THREE.RepeatWrapping; }
  );

  water = new THREE.Water(waterGeometry, {
    textureWidth: 2048,
    textureHeight: 2048,
    waterNormals,
    sunDirection: sun,
    sunColor: 0xffffff,
    waterColor: 0x1e90ff,
    distortionScale: 3.2,
    fog: true
  });

  water.rotation.x = -Math.PI / 2;
  scene.add(water);

  window.addEventListener("resize", onWindowResize);
}

function updateSun() {
  const phi = THREE.MathUtils.degToRad(52);
  const theta = THREE.MathUtils.degToRad(120);

  sun.setFromSphericalCoords(1, phi, theta);

  sky.material.uniforms["sunPosition"].value.copy(sun);
  water.material.uniforms.sunDirection.value
    .set(sun.x, sun.y, sun.z)
    .normalize();
}

function onWindowResize() {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
  requestAnimationFrame(animate);

  water.material.uniforms["time"].value += 0.55 / 60.0;

  camTime += camSpeed;
  camera.position.y = 65 + Math.sin(camTime * 1.25) * 1.4;
  camera.position.z = 165 + Math.sin(camTime * 0.25) * 7;
  camera.position.x = Math.sin(camTime * 0.22) * 11;
  camera.lookAt(0, 0, 0);

  renderer.render(scene, camera);
}
</script>

</body>
</html>
