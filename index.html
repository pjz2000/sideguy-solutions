<script>
let scene, camera, renderer;
let oceanBase, oceanHighlight;
let sharedGeo;
let highlightUniforms;

function init() {
  const container = document.getElementById("bg3d");

  scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x0a0f1c, 25, 150); // softer horizon, cinematic

  camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth / window.innerHeight,
    0.1,
    2000
  );
  camera.position.set(0, 9, 34);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x0a0f1c, 1); // deeper pacific base
  container.appendChild(renderer.domElement);

  // --- LIGHTING (more natural + warm sun) ---
  const ambient = new THREE.HemisphereLight(0x88bfff, 0x0a0f1c, 0.55);
  scene.add(ambient);

  const sunLight = new THREE.DirectionalLight(0xffc27c, 1.5);
  sunLight.position.set(-80, 55, 60); // sun direction
  scene.add(sunLight);

  // --- SHARED OCEAN GEOMETRY ---
  sharedGeo = new THREE.PlaneGeometry(480, 480, 240, 240);
  sharedGeo.rotateX(-Math.PI / 2);

  // Color gradient (cleaner, more movie-like blues)
  const pos = sharedGeo.attributes.position;
  const colors = new Float32Array(pos.count * 3);
  const shallow = new THREE.Color("#2eb7df");
  const deep = new THREE.Color("#02101c");
  const tmp = new THREE.Color();

  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i);
    const z = pos.getZ(i);
    const d = Math.sqrt(x * x + z * z);
    let t = d / 330;
    t = THREE.MathUtils.clamp(t, 0, 1);
    tmp.lerpColors(shallow, deep, t);
    colors[i * 3 + 0] = tmp.r;
    colors[i * 3 + 1] = tmp.g;
    colors[i * 3 + 2] = tmp.b;
  }

  sharedGeo.setAttribute("color", new THREE.BufferAttribute(colors, 3));

  // Base material
  const loader = new THREE.TextureLoader();
  const normalMap = loader.load(
    "https://cdn.jsdelivr.net/gh/mrdoob/three.js@master/examples/textures/waternormals.jpg"
  );
  normalMap.wrapS = normalMap.wrapT = THREE.RepeatWrapping;

  const baseMat = new THREE.MeshStandardMaterial({
    vertexColors: true,
    metalness: 0.65,
    roughness: 0.32,
    normalMap,
    normalScale: new THREE.Vector2(1.25, 1.25)
  });

  oceanBase = new THREE.Mesh(sharedGeo, baseMat);
  scene.add(oceanBase);

  // --- HIGHLIGHT PASS (improved Fresnel + sun reflection) ---
  highlightUniforms = {
    uSunDir:   { value: new THREE.Vector3(-2.5, 1.5, 1.0).normalize() },
    uWarm:     { value: new THREE.Color("#ffaf6b") }, // sun color
    uCool:     { value: new THREE.Color("#66d7ff") }  // rim color
  };

  const highlightMat = new THREE.ShaderMaterial({
    uniforms: highlightUniforms,
    vertexShader: `
      varying vec3 vPos;
      varying vec3 vNormal;

      void main() {
        vec4 wp = modelMatrix * vec4(position, 1.0);
        vPos = wp.xyz;
        vNormal = normalize(normalMatrix * normal);
        gl_Position = projectionMatrix * viewMatrix * wp;
      }
    `,
    fragmentShader: `
      uniform vec3 uSunDir;
      uniform vec3 uWarm;
      uniform vec3 uCool;

      varying vec3 vPos;
      varying vec3 vNormal;

      void main() {
        vec3 N = normalize(vNormal);
        vec3 V = normalize(cameraPosition - vPos);
        vec3 L = normalize(uSunDir);

        // Fresnel (rim light)
        float fres = pow(1.0 - max(dot(N, V), 0.0), 2.5);

        // Warm sun reflection
        float spec = pow(max(dot(N, normalize(L + V)), 0.0), 110.0);

        vec3 color = uCool * fres * 0.9 + uWarm * spec * 1.8;
        float alpha = clamp(fres * 1.0 + spec * 1.3, 0.0, 1.0);

        gl_FragColor = vec4(color, alpha);
      }
    `,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });

  oceanHighlight = new THREE.Mesh(sharedGeo, highlightMat);
  scene.add(oceanHighlight);

  window.addEventListener("resize", onResize);
  animate();
}

function animate() {
  requestAnimationFrame(animate);

  const t = performance.now() * 0.00035;
  const pos = sharedGeo.attributes.position;

  // More natural swell: slower, smoother, layered
  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i);
    const z = pos.getZ(i);

    const y1 = Math.sin(x * 0.035 + t * 1.2) * 0.9;  // big swell
    const y2 = Math.cos(z * 0.055 + t * 1.4) * 0.55; // cross swell
    const y3 = Math.sin((x + z) * 0.06 + t * 2.1) * 0.28; // fine detail

    pos.setY(i, y1 + y2 + y3);
  }

  pos.needsUpdate = true;
  sharedGeo.computeVertexNormals();

  // Camera — smoother cinematic orbit
  const camR = 22;
  camera.position.x = Math.sin(t * 0.25) * camR;
  camera.position.z = 34 + Math.cos(t * 0.18) * 15;
  camera.position.y = 9 + Math.sin(t * 0.28) * 1.0;
  camera.lookAt(0, 0, 0);

  renderer.render(scene, camera);
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

init();
</script>
