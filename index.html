<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />
  <title>SideGuy Solutions | Where Code Meets the Coastline</title>
  <meta
    name="description"
    content="SideGuy Solutions — Web3 coastal concierge for tech, transport, and smarter systems in North County. From Solana Beach to Encinitas, PJ helps you move, build, and live freely."
  />

  <style>
    :root {
      --bg: #020617;
      --blue-bg: radial-gradient(circle at top, #38bdf8 0%, #0f172a 45%, #020617 100%);
      --card: rgba(15, 23, 42, 0.9);
      --muted: #a0aec0;
      --text: #e5f2ff;
      --brand1: #38bdf8;
      --brand2: #22d3ee;
      --brand3: #818cf8;
      --accent: #2dd4bf;
      --accent-soft: rgba(45, 212, 191, 0.15);
      --radius: 14px;
      --shadow-soft: 0 18px 45px rgba(15, 23, 42, 0.75);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: var(--blue-bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Inter",
        "Segoe UI", sans-serif;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      animation: fadeIn 0.9s ease-out;
      position: relative;
      z-index: 1;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px;
    }

    a {
      color: var(--brand2);
      text-decoration: none;
      transition: color 0.18s ease;
    }

    a:hover {
      color: var(--accent);
      text-decoration: underline;
    }

    a:focus {
      outline: 2px solid var(--brand2);
      outline-offset: 2px;
    }

    /* OCEAN BACKGROUND (WEBGL) */
    #ocean-container {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: radial-gradient(circle at top, #041b3b, #000814 60%, #000611);
    }

    .ocean-overlay-gradient {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% -20%, rgba(0, 180, 255, 0.25), transparent 60%),
        radial-gradient(circle at 20% 120%, rgba(0, 255, 210, 0.18), transparent 60%),
        radial-gradient(circle at 90% 110%, rgba(60, 140, 255, 0.16), transparent 55%);
      mix-blend-mode: screen;
      opacity: 0.95;
    }

    /* NAVBAR */
    .nav {
      position: sticky;
      top: 0;
      z-index: 40;
      background: radial-gradient(
          circle at top,
          rgba(56, 189, 248, 0.35),
          transparent 60%
        ),
        rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(148, 163, 184, 0.25);
    }

    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
    }

    .brand {
      font-weight: 800;
      letter-spacing: 0.03em;
      font-size: 18px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .brand span.logo-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: radial-gradient(circle, #22d3ee, #0ea5e9);
      box-shadow: 0 0 12px rgba(56, 189, 248, 0.9);
    }

    .menu {
      list-style: none;
      display: flex;
      gap: 16px;
      font-size: 13px;
    }

    .menu a {
      color: var(--muted);
      font-weight: 500;
      padding: 4px 0;
    }

    .menu a:hover {
      color: var(--brand2);
    }

    /* HERO WITH OCEAN PORTAL */
    .hero {
      position: relative;
      overflow: hidden;
      padding: 72px 20px 140px;
      text-align: center;
      background: linear-gradient(
        to bottom,
        rgba(15, 23, 42, 0.5),
        rgba(2, 6, 23, 0.9)
      );
      box-shadow: inset 0 -40px 80px rgba(15, 23, 42, 0.9);
      z-index: 1;
    }

    .hero::before {
      /* subtle dark overlay over the ocean */
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top, rgba(15, 23, 42, 0.4), transparent 60%);
      pointer-events: none;
      z-index: 1;
    }

    .hero-inner {
      position: relative;
      z-index: 2;
    }

    .hero-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.7);
      border: 1px solid rgba(148, 163, 184, 0.4);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 18px;
    }

    .hero-kicker span.dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 10px rgba(34, 197, 94, 0.9);
    }

    .hero h1 {
      font-size: clamp(30px, 5vw, 40px);
      line-height: 1.1;
      font-weight: 900;
      letter-spacing: 0.01em;
      margin-bottom: 14px;
      text-shadow: 0 16px 50px rgba(15, 23, 42, 0.85);
    }

    .hero h1 span.highlight {
      background: linear-gradient(120deg, #22d3ee, #a855f7);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .hero p {
      max-width: 640px;
      margin: 0 auto;
      color: #e2e8f0;
      font-size: 15px;
      opacity: 0.94;
    }

    .hero-pj-line {
      margin-top: 10px;
      font-size: 13px;
      color: #cbd5f5;
    }

    .hero-pj-line strong {
      color: #e0f2fe;
    }

    .hero-contacts {
      margin-top: 16px;
      font-size: 13px;
      color: var(--muted);
    }

    .hero-contacts a {
      font-weight: 600;
    }

    /* PORTAL ORB */
    .portal-orb-wrapper {
      margin-top: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none; /* orb itself will re-enable */
    }

    .portal-orb {
      position: relative;
      width: 190px;
      height: 190px;
      border-radius: 999px;
      background:
        radial-gradient(circle at 30% 20%, rgba(255, 255, 255, 0.3), transparent 60%),
        radial-gradient(circle at 50% 120%, rgba(0, 255, 210, 0.55), rgba(0, 112, 255, 0.9));
      box-shadow:
        0 0 40px rgba(0, 255, 245, 0.45),
        0 0 90px rgba(0, 140, 255, 0.6);
      border: 1px solid rgba(190, 248, 255, 0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
      animation: orbFloat 5.5s ease-in-out infinite;
      pointer-events: auto;
      z-index: 3;
    }

    .portal-orb::before,
    .portal-orb::after {
      content: "";
      position: absolute;
      inset: -30%;
      background: conic-gradient(
        from 0deg,
        rgba(0, 255, 255, 0.2),
        transparent 40%,
        rgba(255, 255, 255, 0.14),
        transparent 75%,
        rgba(0, 255, 210, 0.22)
      );
      mix-blend-mode: screen;
      opacity: 0.75;
      animation: orbSweep 9s linear infinite;
    }

    .portal-orb::after {
