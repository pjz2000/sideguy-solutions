function calcSolanaSavings() {
  const vol = parseFloat(document.getElementById("sol-volume").value || 0);
  const fee = parseFloat(document.getElementById("sol-fee").value || 0) / 100;

  const legacy = vol * fee + 0.30;
  const solana = vol * 0.00025;

  document.getElementById("tool-modal-result").innerHTML = `
    <div class="result-line">Legacy Fees: $${legacy.toFixed(2)}</div>
    <div class="result-line">Solana Fees: $${solana.toFixed(4)}</div>
    <div class="result-big">You Save: $${(legacy - solana).toFixed(2)}</div>
  `;
}

function calcStablecoinFees() {
  const amt = parseFloat(document.getElementById("sc-amount").value || 0);

  const legacy = amt * 0.029 + 0.30;
  const usdc = amt * 0.00025;

  document.getElementById("tool-modal-result").innerHTML = `
    <div class="result-line">Legacy processor: $${legacy.toFixed(2)}</div>
    <div class="result-line">USDC/Solana: $${usdc.toFixed(4)}</div>
    <div class="result-big">Savings: $${(legacy - usdc).toFixed(2)}</div>
  `;
}

function calcYield() {
  const rev = parseFloat(document.getElementById("yield-revenue").value || 0);
  const rate = parseFloat(document.getElementById("yield-rate").value || 0) / 100;

  const monthly = (rev * rate) / 12;

  document.getElementById("tool-modal-result").innerHTML = `
    <div class="result-line">Monthly Yield: $${monthly.toFixed(2)}</div>
  `;
}

function calcEscrow() {

  document.getElementById("tool-modal-result").innerHTML = `

function calcTickets() {
  const hype = parseFloat(document.getElementById("tix-hype").value || 0);
  const cap = parseFloat(document.getElementById("tix-cap").value || 0);

  const speed = Math.max(1, 11 - hype);
  const estimate = Math.round(cap / speed);

  document.getElementById("tool-modal-result").innerHTML = `
    <div class="result-big">Est. Sellout: ${estimate} tickets/day</div>
  `;
}

function calcDFS() {
  const credit = parseFloat(document.getElementById("dfs-credit").value || 0);
  const mult = parseFloat(document.getElementById("dfs-mult").value || 0);

  const ev = credit * mult;

  document.getElementById("tool-modal-result").innerHTML = `
    <div class="result-big">Expected Value: $${ev.toFixed(2)}</div>

/* ======================================================
      OCEAN ANIMATION
====================================================== */

let oceanRenderer, oceanScene, oceanCamera, oceanMesh, oceanMat;

function initOcean() {
  const canvas = document.getElementById("ocean-canvas");
  if (!canvas) return;

  oceanRenderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  oceanRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  oceanRenderer.setSize(window.innerWidth, window.innerHeight);
  oceanRenderer.setClearColor(0x020617, 1);

  oceanScene = new THREE.Scene();

  oceanCamera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth / window.innerHeight,
    0.1,
    100
  );
  oceanCamera.position.set(0, 1.5, 2.4);
  oceanCamera.lookAt(0, 0, 0);

  const geometry = new THREE.PlaneGeometry(8, 6, 200, 160);

  oceanMat = new THREE.ShaderMaterial({
    vertexShader: vertexShader,
    fragmentShader: fragmentShader,
    uniforms: {
      uTime: { value: 0 },
    },
  });

  oceanMesh = new THREE.Mesh(geometry, oceanMat);
  oceanMesh.rotation.x = -Math.PI / 2.2;
  oceanMesh.position.y = -0.5;
  oceanScene.add(oceanMesh);

  animateOcean();
}

function animateOcean() {
  requestAnimationFrame(animateOcean);

  const t = performance.now() * 0.0015;
  if (oceanMat) oceanMat.uniforms.uTime.value = t;

  if (oceanRenderer && oceanScene && oceanCamera) {
    oceanRenderer.render(oceanScene, oceanCamera);
  }
}

window.addEventListener("resize", () => {
  if (!oceanRenderer || !oceanCamera) return;
  oceanCamera.aspect = window.innerWidth / window.innerHeight;
  oceanCamera.updateProjectionMatrix();
  oceanRenderer.setSize(window.innerWidth, window.innerHeight);
});

document.addEventListener("DOMContentLoaded", () => {
  initOcean();
});

  <!-- Ocean Shaders used by initOcean() in Part 3 -->
  <script>
    const vertexShader = `
      varying vec2 vUv;
      uniform float uTime;

      void main() {
        vUv = uv;
        vec3 pos = position;

        float t = uTime * 0.7;

        // Layered waves for a more real ocean feel
        float wave1 = sin(pos.x * 0.8 + t) * 0.10;
        float wave2 = sin((pos.x + pos.z) * 0.6 - t * 1.4) * 0.08;
        float wave3 = sin(pos.z * 1.1 - t * 0.9) * 0.10;

        float height = wave1 + wave2 + wave3;
        pos.y += height;

        gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
      }
    `;

    const fragmentShader = `
      varying vec2 vUv;
      uniform float uTime;

      void main() {
        vec2 uv = vUv;

        // Base depth gradient
        float depth = smoothstep(0.0, 1.0, uv.y);
        vec3 deep = vec3(0.01, 0.06, 0.13);
        vec3 mid  = vec3(0.03, 0.24, 0.42);
        vec3 top  = vec3(0.24, 0.70, 0.96);

        vec3 col = mix(deep, mid, depth);
        col = mix(col, top, pow(1.0 - depth, 3.0));

        // Soft horizon glow
        float t = uTime * 0.35;
        float glowBand = smoothstep(0.15, 0.55, uv.y + sin(uv.x * 3.0 + t) * 0.03);
        vec3 glow = vec3(0.32, 0.65, 1.0) * glowBand * 0.35;
        col += glow;

        // Tiny foam shimmer
        float foam = sin(uv.x * 28.0 + t * 1.6) * cos(uv.y * 40.0 - t * 1.3);
        foam = smoothstep(0.4, 0.85, foam);
        col += vec3(0.75, 0.93, 1.0) * foam * 0.25;

        // Vignette for depth
        float vignette = smoothstep(0.85, 0.25, length(uv - 0.5));
        col *= mix(0.72, 1.18, vignette);

        gl_FragColor = vec4(col, 1.0);
      }
    `;
  </script>
