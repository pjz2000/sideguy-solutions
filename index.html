    <style>

        ROOT THEME
        ================================================= */
        :root {

            --bg-night: #000814;

            --soft: #94a3b8;

            --accent-night: #4cc9ff;

            --radius: 18px;
            --pill: 999px;

            --shadow-deep: 0 22px 70px rgba(15, 23, 42, 0.96);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            width: 100%;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
            color: var(--text);
            /* Fallback background in case WebGL doesn't load */
            background: var(--bg);
            overflow-x: hidden;
            min-height: 100vh;
            transition: background 0.5s ease;
        }

        a {
            color: var(--accent);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        /* ================================================
        OCEAN CANVAS (Crucial for fullscreen 3D background)
        ================================================= */
        #ocean-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            display: block;
            /* Remove default CSS background, letting Three.js render the perfect scene */
            background: none; 
        }

        ================================================= */

        }

        @media (max-width: 880px) {
