<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SideGuy Solutions | Real Ocean Engine</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #020617;
    height: 100%;
  }
  #ocean-canvas {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
  }

  #modeBtn {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.3);
    padding: 10px 18px;
    border-radius: 50px;
    font-family: sans-serif;
    color: white;
    cursor: pointer;
    z-index: 10;
    backdrop-filter: blur(8px);
  }

  #label {
    position: fixed;
    top: 60px;
    right: 20px;
    color: #8bdcff;
    font-family: sans-serif;
    font-size: 12px;
    z-index: 10;
  }
</style>
</head>

<body>

<button id="modeBtn">Switch Ocean Mode</button>
<div id="label">Pacific Blue</div>

<canvas id="ocean-canvas"></canvas>

<script src="https://unpkg.com/three@0.138.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.138.0/examples/js/objects/Water.js"></script>
<script src="https://unpkg.com/three@0.138.0/examples/js/controls/OrbitControls.js"></script>

<script>
/* ===========================================================
   OFFICIAL THREE.JS WATER (GUARANTEED TO RENDER)
   =========================================================== */

let camera, scene, renderer, water, sun, mode = 0;

init();
animate();

function init() {

  const canvas = document.getElementById("ocean-canvas");

  renderer = new THREE.WebGLRenderer({
    canvas: canvas,
    antialias: true
  });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(
    55,
    window.innerWidth / window.innerHeight,
    1,
    20000
  );
  camera.position.set(0, 50, 120);

  sun = new THREE.Vector3();

  // SKY COLOR (deep pacific)
  const waterGeometry = new THREE.PlaneGeometry(20000, 20000);

  /* ---- WATER NORMALS (From CDN, SAFE) ---- */
  const waterNormals = new THREE.TextureLoader().load(
    "https://threejs.org/examples/textures/waternormals.jpg",
    function (tex) {
      tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    }
  );

  /* ---- WATER MATERIAL ---- */
  water = new THREE.Water(waterGeometry, {
    textureWidth: 1024,
    textureHeight: 1024,
    waterNormals: waterNormals,
    sunDirection: new THREE.Vector3(),
    sunColor: 0xffffff,
    waterColor: 0x001e57, // deep pacific blue
    distortionScale: 3.7,
    fog: false
  });

  water.rotation.x = -Math.PI / 2;
  scene.add(water);

  /* ---- LIGHT ---- */
  const light = new THREE.DirectionalLight(0xffffff, 1);
  scene.add(light);

  /* ---- SKYBOX ---- */
  scene.background = new THREE.Color("#0a1a39");

  /* ---- CONTROLS (optional) ---- */
  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.maxPolarAngle = Math.PI * 0.48;
  controls.enableZoom = false;

  /* ---- MODE TOGGLE ---- */
  document.getElementById("modeBtn").onclick = toggleMode;

  window.addEventListener("resize", onWindowResize);
}

function toggleMode() {
  mode = (mode + 1) % 3;

  if (mode === 0) {
    water.material.uniforms["waterColor"].value = new THREE.Color(0x001e57); // Pacific
    document.getElementById("label").textContent = "Pacific Blue";
  }
  if (mode === 1) {
    water.material.uniforms["waterColor"].value = new THREE.Color(0x037acb); // Tropical
    document.getElementById("label").textContent = "Tropical Blue";
  }
  if (mode === 2) {
    water.material.uniforms["waterColor"].value = new THREE.Color(0x0a0f2b); // Night
    scene.background = new THREE.Color("#05080f");
    document.getElementById("label").textContent = "Night Mode";
  }
}

function onWindowResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
  requestAnimationFrame(animate);
  water.material.uniforms["time"].value += 0.9 / 60.0;
  renderer.render(scene, camera);
}
</script>

</body>
</html>
