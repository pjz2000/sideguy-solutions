<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>SideGuy Solutions | Ocean Base</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #0099ff;
    font-family: sans-serif;
  }

  #waveCanvas {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
  }

  #label {
    position: fixed;
    top: 20px;
    left: 20px;
    font-size: 16px;
    color: white;
    text-shadow: 0 0 8px black;
    z-index: 10;
  }
</style>
</head>

<body>
<div id="label">🌊 SideGuy Solutions — Ocean Base Online</div>

<canvas id="waveCanvas"></canvas>

<script>
/* -------------------------------------
   SIMPLE FAST OCEAN CANVAS (STAGE 1)
   ------------------------------------- */

const canvas = document.getElementById("waveCanvas");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let t = 0;

function draw() {
  t += 0.02;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < 3; i++) {
    ctx.beginPath();
    ctx.moveTo(0, canvas.height * 0.6 + i * 15);

    for (let x = 0; x < canvas.width; x++) {
      const y =
        Math.sin((x * 0.01) + t * (0.4 + i * 0.2)) * (12 + i * 4) +
        canvas.height * 0.6 +
        i * 18;

      ctx.lineTo(x, y);
    }

    ctx.strokeStyle = `rgba(255,255,255,${0.15 - i * 0.04})`;
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
