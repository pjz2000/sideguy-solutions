<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SideGuy Solutions - Custom Software & DeFi Solutions | AI Assistants, Solana Integrations, Carbon Credits</title>
  <meta name="description" content="SideGuy Solutions - Custom software for carbon credits, parlay bombs, Solana DeFi integrations, and AI-powered virtual assistants. Connect your Phantom wallet, calculate yields, automate leads, and build coastal delivery solutions in Solana Beach." />

  <style>
    /* --- SideGuy Coastal Theme v2.1 (Optimized & Readable) --- */
    :root {
      --bg: #0a1122;
      --blue-bg: linear-gradient(135deg, #1e40af 0%, #3b82f6 50%, #60a5fa 100%);
      --card: #121b30;
      --muted: #a0aec0;
      --text: #f0f4f8;
      --brand1: #4da8ff;
      --brand2: #1cc8e5;
      --brand3: #8b5cf6;
      --accent: #2dd4bf;
      --radius: 12px;
      --shadow: 0 8px 20px rgba(10, 17, 34, 0.25);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--blue-bg);
      color: var(--text);
      font-family: "Inter", system-ui, -apple-system, Segoe UI, Roboto;
      line-height: 1.6;
    }

    .container { max-width: 1100px; margin: auto; padding: 0 20px; }

    a { color: var(--brand2); text-decoration: none; transition: color 0.2s; }
    a:hover { color: var(--accent); text-decoration: underline; }

    /* Navbar */
    .nav {
      position: sticky;
      top: 0;
      background: rgba(10, 17, 34, 0.6);
      backdrop-filter: blur(10px);
      z-index: 50;
    }
    .nav .inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
    }
    .brand { font-weight: 800; font-size: 20px; color: var(--text); }
    .menu { display: flex; gap: 18px; list-style: none; }
    .menu a { color: var(--muted); font-size: 14px; font-weight: 600; }
    .menu a:hover { color: var(--brand2); }

    /* Buttons */
    .btn {
      cursor: pointer;
      border: none;
      border-radius: var(--radius);
      padding: 12px 18px;
      background: linear-gradient(90deg, var(--brand1), var(--brand3));
      color: white;
      font-weight: 700;
      box-shadow: var(--shadow);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(10, 17, 34, 0.3);
    }

    /* Hero */
    .hero {
      padding: 64px 20px;
      text-align: center;
      background: var(--blue-bg);
      color: var(--text);
    }
    .hero h1 {
      font-size: clamp(32px, 5vw, 40px);
      margin-bottom: 20px;
    }
    .hero p {
      color: var(--muted);
      max-width: 700px;
      margin: 10px auto;
    }

    /* Section */
    .section {
      padding: 40px 20px;
      background: var(--card);
    }
    .section-subtitle {
      font-size: 16px;
      max-width: 800px;
      margin: 0 auto 20px;
      text-align: center;
      color: var(--muted);
    }

    /* Layouts */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }
    .card {
      padding: 20px;
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }
    .card h3 { color: var(--text); }

    /* Ticker */
    .crypto-ticker {
      background: rgba(28, 200, 229, 0.1);
      overflow: hidden;
      white-space: nowrap;
      padding: 10px;
      text-align: center;
    }
    .ticker-item {
      display: inline-block;
      margin-right: 30px;
      color: var(--text);
      font-size: 14px;
      animation: ticker 20s linear infinite;
    }
    @keyframes ticker {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }

    /* Table */
    .yields-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      color: var(--text);
    }
    .yields-table th, .yields-table td {
      padding: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    .positive { color: var(--accent); }
    .negative { color: #ef4444; }

    /* Footer */
    .footer {
      text-align: center;
      padding: 40px 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.2);
      background: var(--card);
      color: var(--muted);
    }

    /* Floating Button */
    .floating-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: linear-gradient(90deg, #3b82f6, #60a5fa);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 14px 24px;
      font-weight: 700;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      cursor: pointer;
      z-index: 1000;
      animation: pulse 2.5s infinite;
      transition: transform 0.2s, box-shadow 0.3s;
    }
    .floating-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(59, 130, 246, 0.5);
    }
