<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>SideGuy Ocean Test</title>

  <style>
    /* RESET */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #000814;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    /* CANVAS — FULLSCREEN */
    #ocean-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      background: radial-gradient(circle at top, #0ea5e9 0%, #001428 70%);
      z-index: -1;
    }

    /* MODE BUTTON */
    #mode-btn {
      position: fixed;
      left: 16px;
      bottom: 16px;
      z-index: 20;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(56, 189, 248, 0.7);
      background: rgba(0, 9, 20, 0.7);
      backdrop-filter: blur(8px);
      color: #e0faff;
      font-size: 0.8rem;
      cursor: pointer;
      letter-spacing: 0.08em;
    }

    /* MODE LABEL */
    #mode-label {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 20;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(0, 9, 20, 0.7);
      border: 1px solid rgba(56, 189, 248, 0.7);
      backdrop-filter: blur(8px);
      color: #e0faff;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>

  <!-- OCEAN SURFACE -->
  <canvas id="ocean-canvas"></canvas>

  <!-- MODE BUTTON -->
  <button id="mode-btn">Cycle Ocean Mode</button>
  <div id="mode-label">Mode: Loading…</div>
       <!-- THREE.JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>

  <script>
    let scene, camera, renderer;
    let oceanMesh, oceanMaterial;
    let clock = new THREE.Clock();

    /* ============================================================
       4 OCEAN MODES (FRAGMENT SHADERS)
       Hybrid V18 Color + UltraBlue Motion + Night + Real Water
    ============================================================ */

    const fragmentClassic = `
      uniform float uTime;
      varying vec3 vPos;

      void main() {
        float d = smoothstep(-1.0, 2.0, vPos.y * 1.2);
        vec3 deep = vec3(0.0, 0.2, 0.45);
        vec3 mid = vec3(0.0, 0.45, 0.85);
        vec3 color = mix(deep, mid, d);

        float shimmer = sin(vPos.x * 20.0 + uTime * 1.5) * 0.04;
        shimmer += sin(vPos.z * 18.0 - uTime * 1.2) * 0.03;
        color += shimmer;

        gl_FragColor = vec4(color, 1.0);
      }
    `;

    const fragmentUltraBlue = `
      uniform float uTime;
      varying vec3 vPos;

      void main() {
        float d = smoothstep(-2.0, 3.0, vPos.y * 2.2);
        vec3 deep = vec3(0.00, 0.15, 0.35);
        vec3 mid = vec3(0.00, 0.60, 1.00);
        vec3 color = mix(deep, mid, d);

        float shimmer = sin(vPos.x * 35.0 + uTime * 2.4) * 0.06;
        shimmer += sin(vPos.z * 22.0 - uTime * 1.6) * 0.04;
        color += shimmer;

        gl_FragColor = vec4(color, 1.0);
      }
    `;

    const fragmentNight = `
      uniform float uTime;
      varying vec3 vPos;

      void main() {
        float d = smoothstep(-2.0, 4.0, vPos.y * 3.0);
        vec3 deep = vec3(0.00, 0.05, 0.12);
        vec3 mid = vec3(0.35, 0.55, 0.90);
        vec3 color = mix(deep, mid, d * 0.4);

        float moon = sin(vPos.x * 18.0 + uTime * 0.9) * 0.03;
        moon += sin(vPos.z * 18.0 - uTime * 0.6) * 0.03;

        color += moon * 1.8;

        gl_FragColor = vec4(color, 1.0);
      }
    `;

    const fragmentRealWater = `
      uniform float uTime;
      varying vec3 vPos;

      void main() {
        float d = smoothstep(-2.0, 3.0, vPos.y * 1.6);
        vec3 deep = vec3(0.00, 0.10, 0.22);
        vec3 mid = vec3(0.15, 0.65, 0.95);
        vec3 color = mix(deep, mid, d);

        float sparkle = sin(vPos.x * 45.0 + uTime * 3.0) * 0.05;
        sparkle += sin(vPos.z * 30.0 - uTime * 2.0) * 0.04;

        color += sparkle;

        gl_FragColor = vec4(color, 1.0);
      }
    `;

    /* ============================================================
       VERTEX SHADER (Gerstner Hybrid, all modes share this)
    ============================================================ */
    const vertexShader = `
      uniform float uTime;
      varying vec3 vPos;

      vec3 wave(vec2 dir, float steep, float wavelength, float speed, vec3 pos) {
        float k = 6.28318 / wavelength;
        float phase = speed * k;
        float f = k * (dot(dir, pos.xz) - speed * uTime);
        float a = steep / k;

        return vec3(
          dir.x * (a * cos(f)),
          a * sin(f),
          dir.y * (a * cos(f))
        );
      }

      void main() {
        vPos = position;
        vec3 p = position;

        p += wave(normalize(vec2(1.0, 0.4)), 0.35, 2.6, 0.8, position);
        p += wave(normalize(vec2(-1.0, 0.2)), 0.25, 1.4, 1.2, position);
        p += wave(normalize(vec2(0.6, -1.0)), 0.18, 3.4, 0.6, position);

        gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0);
      }
    `;

    /* ============================================================
       MODE SETUP
    ============================================================ */
    let modes = [
      { name: "Classic Blue", shader: fragmentClassic },
      { name: "UltraBlue Swell", shader: fragmentUltraBlue },
      { name: "MoonShimmer Night", shader: fragmentNight },
      { name: "Real Water", shader: fragmentRealWater }
    ];

    let currentMode = 0;
    /* ============================================================
       CREATE OCEAN MATERIAL BASED ON CURRENT MODE
    ============================================================ */
    function createMaterial(modeIndex) {
      return new THREE.ShaderMaterial({
        uniforms: {
          uTime: { value: 0 }
        },
        vertexShader: vertexShader,
        fragmentShader: modes[modeIndex].shader,
        side: THREE.DoubleSide
      });
    }

    /* ============================================================
       INIT THREE.JS SCENE
    ============================================================ */
    function initOcean() {
      const canvas = document.getElementById("ocean-canvas");

      scene = new THREE.Scene();

      camera = new THREE.PerspectiveCamera(
        60,
        window.innerWidth / window.innerHeight,
        0.1,
        100
      );
      camera.position.set(0, 1.8, 3.5);

      renderer = new THREE.WebGLRenderer({
        canvas,
        antialias: false,
        alpha: false,
        premultipliedAlpha: false,
        powerPreference: "high-performance"
      });

      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(window.devicePixelRatio);

      // Ocean geometry
      const geo = new THREE.PlaneGeometry(20, 20, 300, 300);
      geo.rotateX(-Math.PI / 2);

      // Material for current mode
      oceanMaterial = createMaterial(currentMode);
      oceanMesh = new THREE.Mesh(geo, oceanMaterial);
      scene.add(oceanMesh);

      // Auto mode based on SD time
      autoSelectMode();

      animate();
    }

    /* ============================================================
       AUTO DAY/NIGHT MODE
       San Diego logic → 6am–6pm = day, else night
    ============================================================ */
    function autoSelectMode() {
      const now = new Date();
      const hour = now.getHours();

      if (hour >= 6 && hour < 18) {
        // Day → Classic Hybrid look
        currentMode = 0; // Classic Blue
      } else {
        // Night → MoonShimmer
        currentMode = 2; // Night mode
      }

      oceanMaterial = createMaterial(currentMode);
      oceanMesh.material = oceanMaterial;

      updateModeLabel();
    }

    /* ============================================================
       MODE SWITCH BUTTON
    ============================================================ */
    document.getElementById("mode-btn").onclick = () => {
      currentMode = (currentMode + 1) % modes.length;
      oceanMaterial = createMaterial(currentMode);
      oceanMesh.material = oceanMaterial;
      updateModeLabel();
    };

    function updateModeLabel() {
      const label = document.getElementById("mode-label");
      label.textContent = "Mode: " + modes[currentMode].name;
    }

    /* ============================================================
       ANIMATION LOOP
    ============================================================ */
    function animate() {
      requestAnimationFrame(animate);

      const t = clock.getElapsedTime();
      oceanMaterial.uniforms.uTime.value = t;

      // Camera slow oceanic motion
      camera.position.x = Math.sin(t * 0.15) * 0.4;
      camera.position.z = 3.5 + Math.sin(t * 0.1) * 0.2;
      camera.position.y = 1.6 + Math.sin(t * 0.07) * 0.15;
      camera.lookAt(0, 0, 0);

      renderer.render(scene, camera);
    }

    /* ============================================================
       HANDLE RESIZE
    ============================================================ */
    window.addEventListener("resize", () => {
      if (!renderer) return;
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    });

    /* ============================================================
       DOM READY
    ============================================================ */
    document.addEventListener("DOMContentLoaded", () => {
      setTimeout(initOcean, 50);
      document.getElementById("mode-label").textContent = "Mode: Starting…";
    });
  </script>
</body>
</html>
