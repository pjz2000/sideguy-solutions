<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />

  <title>SideGuy Solutions | Coastal Tech Concierge</title>
  <meta name="description"
    content="SideGuy Solutions — San Diego coastal tech concierge for apps, AI automation, Solana payments, ticketing, and DFS systems. Built from Solana Beach and North County." />

  <style>
    :root {
      --sol-purple:#9945ff;
      --sol-green:#14f195;
      --sol-blue:#00ffa3;

      --bg:#020617;
      --text:#e8f0ff;
      --soft:#94a3b8;
      --muted:#64748b;

      --card:rgba(15,23,42,0.78);
      --glass:rgba(15,23,42,0.68);

      --pill:999px;
      --radius:18px;
    }

    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      font-family:Inter,system-ui,sans-serif;
      background:var(--bg);
      color:var(--text);
      overflow-x:hidden;
    }

    /* FULLSCREEN ENHANCED OCEAN BG */
    #oceanCanvas{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      z-index:-2;
    }
    #oceanOverlay{
      position:fixed;
      inset:0;
      background:radial-gradient(circle at top,rgba(0,140,255,0.25),rgba(2,6,23,0.65));
      z-index:-1;
      pointer-events:none;
    }

    /* NAV */
    header{
      position:fixed;top:0;left:0;right:0;
      padding:12px 16px;
      z-index:20;
      backdrop-filter:blur(18px);
      background:rgba(2,6,23,0.72);
      border-bottom:1px solid rgba(56,189,248,0.25);
    }
    .nav-inner{
      max-width:1120px;margin:auto;
      display:flex;align-items:center;justify-content:space-between;
    }
    .brand{
      display:flex;align-items:center;gap:10px;
    }
    .pill-logo{
      width:32px;height:32px;border-radius:50%;
      background:radial-gradient(circle at 30% 20%,#e0f2fe,#38bdf8 40%,#0f172a 100%);
      box-shadow:0 0 26px rgba(56,189,248,.9);
    }
    .brand-text{
      font-size:.92rem;font-weight:800;
      letter-spacing:.14em;text-transform:uppercase;
    }
    .nav-links a{
      margin-left:14px;
      color:var(--soft);
      font-size:.74rem;
      text-transform:uppercase;
      letter-spacing:.14em;
      border-bottom:1px solid transparent;
      cursor:pointer;
    }
    .nav-links a:hover{
      color:#e8f0ff;
      border-bottom-color:rgba(56,189,248,0.8);
    }

    /* HERO */
    main{
      padding-top:16vh;
      position:relative;
      z-index:5;
    }
    .hero{
      max-width:900px;margin:auto;text-align:center;
      padding-inline:16px;
    }
    .hero-title{
      font-size:3.1rem;font-weight:900;line-height:1.05;
      background:linear-gradient(90deg,var(--sol-purple),var(--sol-green),var(--sol-blue));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      margin-bottom:12px;
      text-shadow:0 15px 40px rgba(0,0,0,0.6);
    }
    .hero-sub{
      font-size:1.04rem;
      color:var(--soft);
      max-width:620px;margin:0 auto 18px;
      line-height:1.55;
    }

    /* SHELL */
    .wrap{
      max-width:940px;
      margin:40px auto;
      padding-inline:16px;
    }

    .card{
      background:var(--card);
      backdrop-filter:blur(14px);
      border-radius:var(--radius);
      border:1px solid rgba(148,163,184,.45);
      padding:22px 20px;
      margin-bottom:24px;
      box-shadow:0 12px 34px rgba(0,0,0,0.55);
    }

    .pill{
      display:inline-block;
      padding:5px 14px;
      border-radius:var(--pill);
      border:1px solid rgba(148,163,184,.42);
      color:var(--soft);
      font-size:.75rem;
      letter-spacing:.14em;
      text-transform:uppercase;
      margin-bottom:10px;
    }

    .solana{
      background:linear-gradient(90deg,var(--sol-purple),var(--sol-green),var(--sol-blue));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      font-weight:850;
    }

    .btn{
      margin-top:14px;padding:10px 18px;
      border:none;cursor:pointer;
      border-radius:var(--pill);
      font-weight:650;letter-spacing:.05em;
      color:white;
      background:linear-gradient(90deg,var(--sol-purple),var(--sol-blue));
      box-shadow:0 0 22px rgba(153,69,255,0.55);
    }

    /* PJ ORB */
    #pjOrb{
      width:120px;height:120px;border-radius:50%;
      margin:20px auto;
      background:radial-gradient(circle at 30% 30%,var(--sol-blue),var(--sol-purple));
      box-shadow:0 0 40px rgba(153,69,255,.6),0 0 70px rgba(20,241,149,.4);
      animation:pulse 2.8s ease-in-out infinite;
      cursor:pointer;
    }
    @keyframes pulse{
      0%{transform:scale(1);}
      50%{transform:scale(1.08);}
      100%{transform:scale(1);}
    }
  </style>
</head>

<body>

<canvas id="oceanCanvas"></canvas>
<div id="oceanOverlay"></div>

<header>
  <div class="nav-inner">
    <div class="brand">
      <div class="pill-logo"></div>
      <div class="brand-text">SideGuy Solutions</div>
    </div>
    <div class="nav-links">
      <a href="#payments">402</a>
      <a href="#edge">Edge</a>
      <a href="#guide">Guide</a>
      <a href="#summon">Summon</a>
    </div>
  </div>
</header>

<main>
  <section class="hero">
    <h1 class="hero-title">Where code meets the coastline.</h1>
    <p class="hero-sub">
      San Diego’s coastal tech concierge — apps, AI automation, Solana payments, ticketing,
      and DFS systems built for North County operators.
    </p>
  </section>

  <div class="wrap">
