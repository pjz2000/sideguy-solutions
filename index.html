<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SideGuy Solutions - Custom Software & DeFi Solutions | AI Assistants, Solana Integrations, Carbon Credits</title>
    <meta name="description" content="SideGuy Solutions - Custom software for carbon credits, parlay bombs, Solana DeFi integrations, and AI-powered virtual assistants. Connect your Phantom wallet, calculate yields, automate leads, and build coastal delivery solutions in Solana Beach.">
    <style>
        /* Coastal Solana Blockchain Beach & Ocean Vibe - v2.0 */
        :root {
            --bg: #0a1122; /* Deep ocean night */
            --card: #121b30; /* Dark wave */
            --muted: #a0aec0; /* Sandy gray, high contrast */
            --text: #e5e7eb; /* White foam */
            --brand1: #4da8ff; /* Coastal Solana blue */
            --brand2: #1cc8e5; /* Ocean aqua */
            --brand3: #8b5cf6; /* Neon blockchain violet */
            --accent: #2dd4bf; /* Teal beach glow */
            --shadow: 0 8px 20px rgba(10,17,34,0.25);
            --radius: 12px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            background:
                radial-gradient(800px 500px at 0% 0%, rgba(77,168,255,0.15), transparent 70%),
                radial-gradient(900px 600px at 100% 10%, rgba(139,92,246,0.1), transparent 70%),
                linear-gradient(to bottom, rgba(28,200,229,0.05), var(--bg)); /* Wave fade */
            color: var(--text);
            font: 16px/1.6 "Inter", system-ui, -apple-system, Segoe UI, Roboto;
        }
        .container { max-width: 1100px; margin: auto; padding: 0 20px; }
        a { color: var(--brand2); text-decoration: none; }
        a:hover { text-decoration: underline; }
        a:focus { outline: 2px solid var(--brand1); outline-offset: 2px; }
        .btn {
            cursor: pointer;
            border: 0;
            border-radius: var(--radius);
            padding: 12px 18px;
            background: linear-gradient(90deg, var(--brand1), var(--brand3));
            color: white;
            font-weight: 700;
            box-shadow: var(--shadow), 0 0 10px rgba(77,168,255,0.3); /* Neon glow */
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }
