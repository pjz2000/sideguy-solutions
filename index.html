<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SideGuy Solutions · Ocean Portal · Aladeen Mode++ (Full Cinematic Build)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #00121f; }

    /* --- Ultra Deep Pacific Gradient --- */
    body {
      background: radial-gradient(circle at 50% 120%, #003b63 0%, #00121f 70%);
      font-family: 'Helvetica Neue', sans-serif;
      color: #fff;
    }

    /* --- Multi‑Layer Caustics Overlay --- */
    .caustics {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: url('https://i.imgur.com/N5HxZ9o.png'); /* abstract caustics texture */
      mix-blend-mode: soft-light;
      opacity: 0.18;
      animation: causticDrift 22s infinite linear;
      pointer-events: none;
      z-index: 2;
    }

    @keyframes causticDrift {
      0% { transform: translate(0,0) scale(1.2); }
      50% { transform: translate(-8%, -4%) scale(1.25); }
      100% { transform: translate(0,0) scale(1.2); }
    }

    /* --- Bubble Field --- */
    .bubble {
      position: fixed;
      bottom: -60px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      box-shadow: 0 0 10px rgba(140,200,255,0.55);
      animation: rise var(--speed) linear infinite;
      opacity: 0.65;
    }

    @keyframes rise {
      from { transform: translateY(0) scale(1); }
      to { transform: translateY(-120vh) scale(1.35); }
    }

    /* --- Ocean Shader Canvas --- */
    #oceanCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
      pointer-events: none;
      opacity: 0.92;
    }

    /* --- Summon PJ Orb 3.0 --- */
    .orb {
      position: absolute;
      bottom: 12vh;
      left: 50%; transform: translateX(-50%);
      width: 200px; height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,180,255,0.45), rgba(0,100,150,0.35));
      backdrop-filter: blur(12px);
      box-shadow:
        0 0 40px rgba(0,180,255,0.65),
        inset 0 0 50px rgba(0,180,255,0.4);
      display: flex;
      justify-content: center; align-items: center;
      cursor: pointer;
      z-index: 5;
      animation: orbPulse 5.5s infinite ease-in-out;
    }

    @keyframes orbPulse {
      0% { transform: translateX(-50%) scale(1); }
      50% { transform: translateX(-50%) scale(1.22); }
      100% { transform: translateX(-50%) scale(1); }
    }

    .orb:hover {
      box-shadow: 0 0 120px rgba(0,210,255,1);
      animation-duration: 3s;
    }

    /* --- Orb Text --- */
    .orbText {
      text-align: center;
      font-size: 1.55rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-shadow: 0 0 12px #54cfff;
    }

    /* --- Cinematic Fade and Glow ---- */
    .fadeIn { animation: fadeIn 3.5s ease forwards; opacity: 0; }

    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

  </style>
</head>
<body>

  <!-- Layer: Caustics -->
  <div class="caustics"></div>

  <!-- Layer: Canvas Waves -->
  <canvas id="oceanCanvas"></canvas>

  <!-- Layer: Rising Bubbles -->
  <script>
    for (let i = 0; i < 35; i++) {
      const b = document.createElement('div');
      b.classList.add('bubble');

      const size = Math.random() * 20 + 10;
      b.style.width = size + 'px';
      b.style.height = size + 'px';

      b.style.left = Math.random() * 100 + 'vw';
      b.style.setProperty('--speed', (Math.random() * 12 + 8) + 's');

      document.body.appendChild(b);
    }
  </script>

  <!-- Summon PJ Orb -->
  <div class="orb fadeIn">
    <div class="orbText">TAP TO<br>SUMMON PJ</div>
  </div>

  <!-- Ocean Shader Script -->
  <script>
    const canvas = document.getElementById('oceanCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = innerWidth;
    canvas.height = innerHeight;

    let t = 0;

    function drawOcean() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // 4‑layer dynamic swell
      for (let i = 0; i < 4; i++) {
        ctx.beginPath();
        let gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
        gradient.addColorStop(0, `rgba(0, ${40 + i*35}, ${90 + i*60}, ${0.18 + i*0.07})`);
        gradient.addColorStop(1, "rgba(0,10,20,0.1)");
        ctx.fillStyle = gradient;

        let amp = 25 + i * 30;
        let freq = 0.0018 + i * 0.0012;

        ctx.moveTo(0, canvas.height * (0.55 + i*0.05));
        for (let x = 0; x < canvas.width; x++) {
          let y = canvas.height * (0.55 + i*0.05) + Math.sin(x * freq + t + i) * amp;
          ctx.lineTo(x, y);
        }

        ctx.lineTo(canvas.width, canvas.height);
        ctx.lineTo(0, canvas.height);
        ctx.closePath();
        ctx.fill();
      }

      t += 0.014;
      requestAnimationFrame(drawOcean);
    }

    drawOcean();
  </script>

</body>
</html>
