<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SideGuy Solutions | Pacific Portal</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, sans-serif;
      color: white;
      overflow: hidden;
      background: black;
    }

    /* VIDEO BACKGROUND */
    .ocean-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: -2;
      filter: brightness(0.85) saturate(1.3);
    }

    /* Dark gradient overlay */
    .ocean-overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg,
        rgba(0,0,0,0.4),
        rgba(0,0,0,0.7)
      );
      z-index: -1;
    }

    /* PAGE WRAPPER */
    .page {
      position: relative;
      z-index: 10;
      padding: 40px 20px;
      text-align: center;
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 700;
      margin-bottom: 16px;
      text-shadow: 0 4px 16px rgba(0,0,0,0.6);
    }

    p.sub {
      font-size: 1.05rem;
      opacity: 0.9;
      max-width: 520px;
      margin: 0 auto 32px;
      text-shadow: 0 3px 12px rgba(0,0,0,0.7);
    }

    /* ORB WRAP */
    .orb-wrap {
      width: 240px;
      height: 240px;
      margin: 0 auto;
      position: relative;
    }

    /* GLOW BEHIND ORB */
    .orb-glow {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle,
        rgba(0,188,255,0.6) 0%,
        rgba(0,90,140,0.1) 60%,
        transparent 100%
      );
      filter: blur(28px);
      z-index: -1;
    }

    /* INTERACTIVE ORB */
    .orb {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%,
        rgba(255,255,255,0.9),
        rgba(0,150,255,0.6),
        rgba(0,80,140,0.9)
      );
      box-shadow:
        0 0 32px rgba(0,200,255,0.7),
        0 0 80px rgba(0,100,200,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform .25s ease, box-shadow .25s ease;
    }

    .orb:hover {
      transform: scale(1.05);
      box-shadow:
        0 0 55px rgba(0,220,255,1),
        0 0 110px rgba(0,120,255,0.8);
    }

    .orb-label {
      font-size: 1rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      text-align: center;
      font-weight: 600;
      text-shadow: 0 4px 12px rgba(0,0,0,0.8);
    }

    /* PAGE FOOTER */
    footer {
      position: absolute;
      bottom: 20px;
      width: 100%;
      text-align: center;
      font-size: .8rem;
      opacity: 0.75;
    }
  </style>
</head>
<body>

  <!-- REAL PACIFIC WAVES VIDEO BACKGROUND -->
  <video class="ocean-bg" autoplay muted loop playsinline>
    <source src="https://cdn.coverr.co/videos/coverr-ocean-waves-at-sunset-8576/1080p.mp4" type="video/mp4">
  </video>

  <!-- Dark overlay for readability -->
  <div class="ocean-overlay"></div>

  <!-- PAGE CONTENT -->
  <div class="page">
    <h1>Where Code Meets the Coastline</h1>
    <p class="sub">Tap the Pacific portal to connect with PJ.  
      Real ocean. Real movement. Real North County energy.
    </p>

    <div class="orb-wrap">
      <div class="orb-glow"></div>

      <div class="orb" id="summon-orb">
        <div class="orb-label">
          TAP TO<br>SUMMON PJ
        </div>
      </div>
    </div>

  </div>

  <footer>
    SideGuy Solutions · v5.1 Real Pacific Portal
  </footer>
  <script>
    const orb = document.getElementById("summon-orb");

    orb.addEventListener("click", () => {
      orb.style.transform = "scale(1.1)";
      orb.style.boxShadow =
        "0 0 80px rgba(0,255,255,1), 0 0 150px rgba(0,150,255,1)";

      setTimeout(() => {
        window.location.href =
          "mailto:pj@sideguysolutions.com?subject=Summon%20PJ%20Portal";
      }, 380);
    });
  </script>

</body>
</html>
