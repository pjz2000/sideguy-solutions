<html lang="en">
<head>

  <!-- Plausible Analytics (privacy-friendly) -->
  <script defer data-domain="sideguysolutions.com" src=https://plausible.io/js/script.js></script>
 
  <style>
    :root {
      --bg: #020617;
      --text-main: #e5f2ff;
      --text-soft: #9ca3af;
      --muted: #6b7280;
      --accent: #38bdf8;
      --accent-strong: #0ea5e9;
      --card: rgba(15, 23, 42, 0.94);
      --border: rgba(148, 163, 184, 0.55);
      --radius: 18px;
      --pill: 999px;
    }
 
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
 
    html, body {
      width: 100%;
      height: 100%;
    }
 
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", sans-serif;
      background: var(--bg);
      color: var(--text-main);
      overflow-x: hidden;
    }
 
    a {
      color: var(--accent);
      text-decoration: none;
    }
 
    a:hover {
      text-decoration: underline;
    }
 
    /* OCEAN BACKGROUND */
    #ocean-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: -3;
      background: radial-gradient(circle at top, #0ea5e9 0%, #020617 55%);
    }
 
    .ocean-overlay {
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      background:
        radial-gradient(circle at 10% -10%, rgba(56, 189, 248, 0.4), transparent 55%),
        radial-gradient(circle at 100% 110%, rgba(14, 165, 233, 0.4), transparent 55%),
        linear-gradient(to bottom, rgba(2, 6, 23, 0.6), rgba(2, 6, 23, 0.97));
    }
 
    /* Parallax surface waves layer */
    #surface-waves {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.08), transparent 65%),
        radial-gradient(circle at 20% 50%, rgba(56, 189, 248, 0.15), transparent 70%),
        radial-gradient(circle at 80% 60%, rgba(59, 130, 246, 0.12), transparent 70%);
      opacity: 0.65;
      mix-blend-mode: screen;
    }
 
    .page-shell {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
 
    /* HEADER / NAV */
    header {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(16px);
      background:
        linear-gradient(to bottom, rgba(15, 23, 42, 0.96), rgba(15, 23, 42, 0.8), transparent);
      border-bottom: 1px solid rgba(148, 163, 184, 0.4);
    }
 
    .nav-inner {
      max-width: 1120px;
      margin: 0 auto;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
 
    .brand-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }
 
    .brand-mark {
      width: 30px;
      height: 30px;
      border-radius: 40%;
      background: radial-gradient(circle at 30% 20%, #e0f2fe, #0ea5e9 55%, #022c43 100%);
      box-shadow:
        0 0 0 1px rgba(148, 163, 184, 0.4),
        0 10px 25px rgba(15, 23, 42, 0.9),
        0 0 45px rgba(56, 189, 248, 0.75);
      position: relative;
      overflow: hidden;
    }
 
    .brand-mark::after {
      content: "";
      position: absolute;
      inset: 18%;
      border-radius: 999px;
      border: 1px solid rgba(248, 250, 252, 0.35);
      box-shadow: 0 0 30px rgba(248, 250, 252, 0.6);
      opacity: 0.7;
    }
 
    .brand-name {
      font-size: 0.95rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
 
    .brand-sub {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.14em;
    }
 
    .nav-right {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.8rem;
    }
 
    .nav-links {
      display: flex;
      gap: 12px;
    }
 
    .nav-link {
      color: var(--text-soft);
      text-decoration: none;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
 
    .nav-link:hover {
      color: var(--accent);
    }
 
    .nav-pill {
      border-radius: var(--pill);
      border: 1px solid rgba(148, 163, 184, 0.6);
      padding: 4px 10px;
      background: radial-gradient(circle at 0 0, rgba(56, 189, 248, 0.4), rgba(15, 23, 42, 0.96));
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      color: var(--text-soft);
    }
 
    .nav-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 10px rgba(34, 197, 94, 0.9);
    }
 
    .version {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.16em;
    }
 
    .version span {
      color: var(--accent);
    }
 
    main {
      flex: 1;
    }
 
    /* HERO */
    .hero-shell {
      max-width: 1120px;
      margin: 0 auto;
      padding: 32px 20px 34px;
      display: grid;
      grid-template-columns: minmax(0, 1.5fr) minmax(0, 1.05fr);
      gap: 28px;
      align-items: center;
    }
 
    @media (max-width: 880px) {
      .hero-shell {
        grid-template-columns: minmax(0, 1fr);
        padding-top: 26px;
      }
    }
 
    .hero-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 4px 11px;
      border-radius: var(--pill);
      border: 1px solid rgba(148, 163, 184, 0.5);
      background: radial-gradient(circle at 0 0, rgba(56, 189, 248, 0.25), rgba(15, 23, 42, 0.98));
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-soft);
      margin-bottom: 12px;
    }
 
    .hero-kicker span.icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      border-radius: 999px;
      background: rgba(8, 47, 73, 0.9);
      box-shadow: 0 0 16px rgba(56, 189, 248, 0.9);
      font-size: 0.75rem;
    }
 
    .hero-title {
      font-size: clamp(2.4rem, 4vw, 3rem);
      line-height: 1.05;
      margin-bottom: 12px;
      text-shadow: 0 16px 40px rgba(15, 23, 42, 0.95);
    }
 
    .hero-title span {
      background: linear-gradient(to right, #e0f2fe, #38bdf8, #a5f3fc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
 
    .hero-sub {
      font-size: 0.98rem;
      line-height: 1.6;
      color: var(--text-soft);
      margin-bottom: 18px;
      max-width: 34rem;
    }
 
    .hero-sub strong {
      color: var(--text-main);
      font-weight: 600;
    }
 
    .hero-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 20px;
    }
 
    .hero-tag-pill {
      border-radius: var(--pill);
      padding: 4px 9px;
      background: rgba(15, 23, 42, 0.92);
      border: 1px solid rgba(148, 163, 184, 0.55);
      backdrop-filter: blur(14px);
    }
 
    .hero-ctas {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 16px;
    }
 
    button {
      font-family: inherit;
      border: none;
      cursor: pointer;
    }
 
    .btn-primary {
      border-radius: var(--pill);
      padding: 10px 18px;
      font-size: 0.9rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: #0b1120;
      background: radial-gradient(circle at 0 0, #e0f2fe, #0ea5e9);
      box-shadow:
        0 0 0 1px rgba(15, 23, 42, 0.8),
        0 18px 35px rgba(8, 47, 73, 0.95),
        0 0 60px rgba(56, 189, 248, 0.9);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transform-origin: center;
      transition:
        transform 0.18s ease-out,
        box-shadow 0.18s ease-out,
        filter 0.18s ease-out;
    }
 
    .btn-primary:hover {
      transform: translateY(-1px) scale(1.02);
      filter: saturate(1.2);
      box-shadow:
        0 0 0 1px rgba(56, 189, 248, 0.9),
        0 20px 40px rgba(8, 47, 73, 1),
        0 0 90px rgba(56, 189, 248, 1);
    }
 
    .btn-ghost {
      border-radius: var(--pill);
      padding: 9px 14px;
      font-size: 0.8rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      border: 1px dashed rgba(148, 163, 184, 0.7);
      background: radial-gradient(circle at 0 0, rgba(30, 64, 175, 0.8), rgba(15, 23, 42, 0.98));
      color: var(--text-soft);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
 
    .hero-meta {
      font-size: 0.78rem;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
 
    .hero-meta span.badge {
      border-radius: var(--pill);
      padding: 3px 9px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.55);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.09em;
    }
 
    /* ORB SIDE (FLOAT ABOVE EVERYTHING) */
    .hero-orb-shell {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 10px;
      z-index: 100;
    }
 
    .orb-glow {
      position: absolute;
      width: 230px;
      height: 230px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 30% 10%, rgba(248, 250, 252, 0.9), transparent 55%),
        radial-gradient(circle at 70% 80%, rgba(56, 189, 248, 0.95), transparent 55%);
      filter: blur(3px);
      opacity: 0.35;
    }
 
    .orb-ring {
      position: absolute;
      width: 250px;
      height: 250px;
      border-radius: 50%;
      border: 1px dashed rgba(148, 163, 184, 0.7);
      box-shadow: 0 0 55px rgba(15, 23, 42, 0.95);
      opacity: 0.75;
    }
 
    #summon-orb {
      position: relative;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      border: 1px solid rgba(248, 250, 252, 0.45);
      background:
        radial-gradient(circle at 10% 0, rgba(248, 250, 252, 0.9), transparent 60%),
        radial-gradient(circle at 80% 90%, rgba(14, 165, 233, 0.95), transparent 60%),
        radial-gradient(circle at 50% 120%, rgba(8, 47, 73, 0.9), #020617);
      box-shadow:
        0 0 40px rgba(15, 23, 42, 0.9),
        0 0 95px rgba(56, 189, 248, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: pointer;
      transition:
        transform 0.18s ease-out,
        box-shadow 0.18s ease-out,
        filter 0.18s ease-out;
      animation: orbPulse 2.6s ease-in-out infinite;
      z-index: 101;
    }
 
    #summon-orb::after {
      content: "";
      position: absolute;
      inset: 18%;
      border-radius: 50%;
      border: 1px solid rgba(248, 250, 252, 0.45);
      box-shadow: 0 0 30px rgba(248, 250, 252, 0.75);
      opacity: 0.75;
    }
 
    #summon-orb:hover {
      transform: translateY(-2px) scale(1.03);
      filter: saturate(1.2);
      box-shadow:
        0 0 40px rgba(56, 189, 248, 0.9),
        0 0 120px rgba(56, 189, 248, 1);
    }
 
    #summon-orb-label {
      position: relative;
      z-index: 1;
      text-align: center;
      text-transform: uppercase;
      font-size: 0.8rem;
      letter-spacing: 0.16em;
      color: #020617;
      font-weight: 700;
      text-shadow:
        0 0 10px rgba(248, 250, 252, 0.9),
        0 0 24px rgba(14, 165, 233, 0.95);
    }
 
    #summon-orb-label span {
      display: block;
      margin-top: 4px;
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      opacity: 0.85;
    }
 
    @keyframes orbPulse {
      0% {
        transform: scale(1);
        box-shadow:
          0 0 40px rgba(56, 189, 248, 0.8),
          0 0 80px rgba(56, 189, 248, 0.8);
      }
      50% {
        transform: scale(1.035);
        box-shadow:
          0 0 55px rgba(56, 189, 248, 1),
          0 0 130px rgba(56, 189, 248, 1);
      }
      100% {
        transform: scale(1);
        box-shadow:
          0 0 40px rgba(56, 189, 248, 0.8),
          0 0 80px rgba(56, 189, 248, 0.8);
      }
    }
 
    .orb-caption {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.16em;
      text-align: center;
    }
 
    /* TOOLKIT SECTION */
    .section-shell {
      max-width: 1120px;
      margin: 0 auto;
      padding: 6px 20px 40px;
    }
 
    .section-header-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 10px;
      align-items: baseline;
      margin-bottom: 16px;
    }
 
    .section-title {
      font-size: 0.9rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }
 
    .section-subtitle {
      font-size: 0.92rem;
      color: var(--text-soft);
    }
 
    .section-subtitle strong {
      color: var(--text-main);
    }
 
    .toolkit-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 0.72rem;
    }
 
    .toolkit-nav button {
      border-radius: var(--pill);
      padding: 4px 9px;
      border: 1px solid rgba(148, 163, 184, 0.6);
      background: rgba(15, 23, 42, 0.9);
      color: var(--text-soft);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.7rem;
    }
 
    .toolkit-nav button:hover {
      color: var(--accent);
      border-color: var(--accent);
    }
 
    .toolkit-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }
 
    @media (max-width: 880px) {
      .toolkit-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
 
    @media (max-width: 640px) {
      .toolkit-grid {
        grid-template-columns: minmax(0, 1fr);
      }
    }
 
    .card {
      position: relative;
      border-radius: var(--radius);
      padding: 12px 12px 13px;
      background: linear-gradient(
        135deg,
        rgba(15, 23, 42, 0.97),
        rgba(15, 23, 42, 0.94),
        rgba(15, 23, 42, 0.9)
      );
      border: 1px solid var(--border);
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(16px);
      overflow: hidden;
    }
 
    .card::before {
      content: "";
      position: absolute;
      inset: -1px;
      background:
        radial-gradient(circle at 0 0, rgba(56, 189, 248, 0.18), transparent 55%),
        radial-gradient(circle at 100% 100%, rgba(56, 189, 248, 0.12), transparent 50%);
      opacity: 0.7;
      pointer-events: none;
      mix-blend-mode: screen;
    }
 
    .card-kicker {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--muted);
      margin-bottom: 4px;
    }
 
    .card-title {
      font-size: 0.96rem;
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--text-main);
    }
 
    .card-body {
      font-size: 0.82rem;
      line-height: 1.5;
      color: var(--text-soft);
      margin-bottom: 8px;
    }
 
    .card-meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      font-size: 0.72rem;
      color: var(--muted);
    }
 
    .card-chip {
      border-radius: var(--pill);
      padding: 3px 8px;
      border: 1px solid rgba(148, 163, 184, 0.7);
      background: rgba(15, 23, 42, 0.9);
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }
 
    .card-link-btn {
      background: none;
      border: none;
      padding: 0;
      color: var(--accent);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.76rem;
      cursor: pointer;
    }
