<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Real Pacific Ocean Test</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #020617;
      height: 100%;
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { Water } from "https://unpkg.com/three@0.160.0/examples/jsm/objects/Water.js";
    import { Sky } from "https://unpkg.com/three@0.160.0/examples/jsm/objects/Sky.js";

    let camera, scene, renderer;
    let water, sun, sky;

    init();
    animate();

    function init() {
      // Renderer
      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.8));
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      // Scene
      scene = new THREE.Scene();
      scene.fog = new THREE.FogExp2(0x020617, 0.18);

      // Camera
      camera = new THREE.PerspectiveCamera(
        60,
        window.innerWidth / window.innerHeight,
        1,
        20000
      );
      camera.position.set(0, 35, 95);

      // Sun (for reflections + sky)
      sun = new THREE.Vector3();

      // Sky
      sky = new Sky();
      sky.scale.setScalar(10000);
      scene.add(sky);

      const skyUniforms = sky.material.uniforms;
      skyUniforms["turbidity"].value = 10;
      skyUniforms["rayleigh"].value = 2;
      skyUniforms["mieCoefficient"].value = 0.005;
      skyUniforms["mieDirectionalG"].value = 0.8;

      // Sun position: SoCal late afternoon vibe
      const phi = THREE.MathUtils.degToRad(88);  // elevation
      const theta = THREE.MathUtils.degToRad(180); // azimuth (over ocean)

      sun.setFromSphericalCoords(1, phi, theta);
      sky.material.uniforms["sunPosition"].value.copy(sun);

      // Env for reflections
      const pmremGenerator = new THREE.PMREMGenerator(renderer);
      const renderTarget = pmremGenerator.fromScene(sky);
      const envMap = renderTarget.texture;

      // Water geometry
      const waterGeometry = new THREE.PlaneGeometry(10000, 10000);

      water = new Water(waterGeometry, {
        textureWidth: 1024,
        textureHeight: 1024,
        waterNormals: new THREE.TextureLoader().load(
          "https://threejs.org/examples/textures/waternormals.jpg",
          (texture) => {
            texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
          }
        ),
        sunDirection: sun.clone().normalize(),
        sunColor: 0xffffff,
        waterColor: 0x0a274a, // Deep Pacific blue
        distortionScale: 3.7,
        fog: scene.fog !== undefined
      });

      water.rotation.x = -Math.PI / 2;
      scene.add(water);

      scene.environment = envMap;

      // Slight camera tilt downward
      camera.lookAt(new THREE.Vector3(0, 0, 0));

      window.addEventListener("resize", onWindowResize);
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate(time) {
      requestAnimationFrame(animate);

      if (water && water.material && water.material.uniforms) {
        water.material.uniforms["time"].value += 0.02;
      }

      // Slow cinematic orbit over ocean
      const t = time * 0.00008;
      const radius = 95;
      camera.position.x = Math.sin(t) * radius;
      camera.position.z = Math.cos(t) * radius;
      camera.position.y = 32 + Math.sin(t * 0.5) * 4;
      camera.lookAt(0, 0, 0);

      renderer.render(scene, camera);
    }
  </script>
</body>
</html>
