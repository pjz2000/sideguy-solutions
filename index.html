<!-- Core Three.js from unpkg (stable) -->
<script src="https://unpkg.com/three@0.152.2/build/three.min.js"></script>

<script>
let scene, camera, renderer, ocean, clock, normalMap;

function init() {
  const container = document.getElementById("bg3d");

  scene = new THREE.Scene();
  // Slightly warm fog → more cinematic depth
  scene.fog = new THREE.Fog(0x041627, 10, 95);

  camera = new THREE.PerspectiveCamera(
    55,
    window.innerWidth / window.innerHeight,
    0.1,
    300
  );
  // AppleTV doc vibe → low, slightly off-center
  camera.position.set(1.4, 4.3, 20.5);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x020617, 1);
  container.appendChild(renderer.domElement);

  clock = new THREE.Clock();

  // === LIGHTS: AppleTV-style soft but punchy ===
  const hemi = new THREE.HemisphereLight(0x8ec5ff, 0x020c19, 0.7);
  scene.add(hemi);

  const sun = new THREE.DirectionalLight(0xffb36b, 1.7); // soft warm
  sun.position.set(-18, 13, 4);
  scene.add(sun);

  // Slight cool kicker from the right (like fill from the sky)
  const coolFill = new THREE.DirectionalLight(0x4cc9ff, 0.35);
  coolFill.position.set(16, 8, 10);
  scene.add(coolFill);

  // === NORMAL MAP for micro ripples ===
  const loader = new THREE.TextureLoader();
  normalMap = loader.load(
    "https://cdn.jsdelivr.net/gh/mrdoob/three.js@master/examples/textures/waternormals.jpg",
    (tex) => {
      tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    }
  );

  // === GEOMETRY: high-res plane ===
  const geo = new THREE.PlaneGeometry(380, 380, 220, 220);
  geo.rotateX(-Math.PI / 2);

  // Vertex color gradient (near = teal, far = deep blue)
  const pos = geo.attributes.position;
  const colorArray = new Float32Array(pos.count * 3);

  const cNear = new THREE.Color("#39c3e0"); // bright but not cartoon
  const cFar  = new THREE.Color("#03111f"); // deep pacific navy
  const c = new THREE.Color();

  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i);
    const z = pos.getZ(i);
    const d = Math.sqrt(x * x + z * z);

    let t = d / 270;
    t = THREE.MathUtils.clamp(t, 0, 1);

    c.lerpColors(cNear, cFar, t);

    colorArray[i * 3]     = c.r;
    colorArray[i * 3 + 1] = c.g;
    colorArray[i * 3 + 2] = c.b;
  }

  geo.setAttribute("color", new THREE.BufferAttribute(colorArray, 3));

  // === MATERIAL: MeshPhysicalMaterial for more “water-like” look ===
  const mat = new THREE.MeshPhysicalMaterial({
    vertexColors: true,
    metalness: 0.7,        // stronger specular reflections
    roughness: 0.28,       // sharper highlights
    clearcoat: 0.9,        // glossy clear surface
    clearcoatRoughness: 0.15,
    normalMap: normalMap,
    normalScale: new THREE.Vector2(0.7, 0.7),
    reflectivity: 0.9
  });

  ocean = new THREE.Mesh(geo, mat);
  scene.add(ocean);

  window.addEventListener("resize", onResize);
  animate();
}

function animate() {
  requestAnimationFrame(animate);

  const t = clock.getElapsedTime();
  const pos = ocean.geometry.attributes.position;

  // AppleTV-style: smooth, layered, not too chaotic
  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i);
    const z = pos.getZ(i);

    // Big slow rolling sets
    const w1 = Math.sin(x * 0.022 + t * 0.7) * 0.45;
    // Mid-frequency chop
    const w2 = Math.cos(z * 0.05 + t * 1.0) * 0.28;
    // Fine shimmer on top
    const w3 = Math.sin((x + z) * 0.038 + t * 1.7) * 0.11;

    pos.setY(i, w1 + w2 + w3);
  }

  pos.needsUpdate = true;
  ocean.geometry.computeVertexNormals();

  // Gentle, controlled camera drift
  const camT = t * 0.45;
  camera.position.x = 1.4 + Math.sin(camT * 0.35) * 1.0;
  camera.position.z = 20.5 + Math.cos(camT * 0.25) * 1.4;
  camera.position.y = 4.3 + Math.sin(camT * 0.22) * 0.22;
  camera.lookAt(0, 1.1, 0);

  renderer.render(scene, camera);
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// Summon PJ
document.getElementById("summonPJ").onclick = () => {
  window.location.href =
    "mailto:peter.z@kromeon.com?subject=Summon%20PJ%20%F0%9F%8C%8A";
};

init();
</script>
