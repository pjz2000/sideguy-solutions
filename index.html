<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>SideGuy Solutions | Crystal Blue Pacific (Stable Reset)</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    height: 100%;
    background: #00223a;
  }

  #ocean-canvas {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
  }

  #label {
    position: fixed;
    top: 20px;
    left: 20px;
    font-family: sans-serif;
    color: #bcecff;
    font-size: 14px;
    z-index: 20;
    text-shadow: 0 0 8px #000;
  }
</style>
</head>

<body>

<div id="label">🌊 Crystal Blue Pacific — BASELINE RESTORE</div>
<canvas id="ocean-canvas"></canvas>

<script src="https://unpkg.com/three@0.138.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.138.0/examples/js/objects/Water.js"></script>
<script src="https://unpkg.com/three@0.138.0/examples/js/objects/Sky.js"></script>

<script>
let camera, scene, renderer, water, sky, sun;
let camTime = 0;
let camSpeed = 0.00033;

init();
animate();

function init() {
  const canvas = document.getElementById("ocean-canvas");

  renderer = new THREE.WebGLRenderer({
    canvas,
    antialias: true
  });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);

  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x1d3b55, 0.0019);

  camera = new THREE.PerspectiveCamera(65, window.innerWidth/window.innerHeight, 1, 20000);
  camera.position.set(0, 65, 165);

  sun = new THREE.Vector3();

  sky = new THREE.Sky();
  sky.scale.setScalar(10000);
  scene.add(sky);

  const skyU = sky.material.uniforms;
  skyU["turbidity"].value = 9;
  skyU["rayleigh"].value = 2.4;
  skyU["mieCoefficient"].value = 0.006;
  skyU["mieDirectionalG"].value = 0.88;

  updateSun();

  const waterGeometry = new THREE.PlaneGeometry(30000, 30000);
  const waterNormals = new THREE.TextureLoader().load(
    "https://threejs.org/examples/textures/waternormals.jpg",
    (t) => { t.wrapS = t.wrapT = THREE.RepeatWrapping; }
  );

  water = new THREE.Water(waterGeometry, {
    textureWidth: 2048,
    textureHeight: 2048,
    waterNormals,
    sunDirection: sun,
    sunColor: 0xffffff,
    waterColor: 0x1e90ff,
    distortionScale: 3.8,
    fog: true
  });

  water.rotation.x = -Math.PI / 2;
  scene.add(water);

  window.addEventListener("resize", onWindowResize);
}

function updateSun() {
  const phi = THREE.MathUtils.degToRad(72);
  const theta = THREE.MathUtils.degToRad(150);

  sun.setFromSphericalCoords(1, phi, theta);

  sky.material.uniforms["sunPosition"].value.copy(sun);
  water.material.uniforms.sunDirection.value.set(sun.x, sun.y, sun.z).normalize();
}

function onWindowResize() {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
  requestAnimationFrame(animate);

  water.material.uniforms["time"].value += 0.55 / 60.0;

  camTime += camSpeed;
  camera.position.y = 65 + Math.sin(camTime * 1.25) * 1.4;
  camera.position.z = 165 + Math.sin(camTime * 0.25) * 7;
  camera.position.x = Math.sin(camTime * 0.22) * 11;
  camera.lookAt(0, 0, 0);

  renderer.render(scene, camera);
}
</script>

</body>
</html>
