<canvas id="ocean-canvas"></canvas>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>

<script>
let scene, camera, renderer, ocean, material;
let start = Date.now();

function initOcean() {
  const canvas = document.getElementById("ocean-canvas");

  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth / window.innerHeight,
    0.1,
    100
  );
  camera.position.set(0, 1.2, 2.4);

  renderer = new THREE.WebGLRenderer({
    canvas,
    antialias: true,
    alpha: true
  });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);

  const geo = new THREE.PlaneGeometry(16, 16, 300, 300);
  geo.rotateX(-Math.PI / 2);

  material = new THREE.ShaderMaterial({
    uniforms: {
      uTime: { value: 0.0 },
      uDeep: { value: new THREE.Color("#001428") },
      uBlue: { value: new THREE.Color("#0b82ff") },
      uFoam: { value: new THREE.Color("#e6faff") }
    },
    vertexShader: `
      uniform float uTime;
      varying vec3 vPos;
      varying vec2 vUv;

      // Gerstner wave function
      vec3 gerstner(vec2 dir, float steep, float wavelength, float speed, vec3 position) {
        float k = 2.0 * 3.14159 / wavelength;
        float phase = speed * k;
        float f = k * (dot(dir, position.xz) - speed * uTime);
        float a = steep / k;

        return vec3(
          dir.x * (a * cos(f)),
          a * sin(f),
          dir.y * (a * cos(f))
        );
      }

      void main() {
        vUv = uv;
        vPos = position;

        vec3 pos = position;

        pos += gerstner(normalize(vec2(1.0, 0.4)), 0.45, 2.5, 0.6, position);
        pos += gerstner(normalize(vec2(-1.0, 0.2)), 0.35, 1.5, 0.9, position);
        pos += gerstner(normalize(vec2(0.6, -1.0)), 0.25, 3.2, 0.4, position);

        gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
      }
    `,
    fragmentShader: `
      uniform float uTime;
      uniform vec3 uDeep;
      uniform vec3 uBlue;
      uniform vec3 uFoam;

      varying vec3 vPos;
      varying vec2 vUv;

      void main() {
        float depth = smoothstep(-1.0, 2.0, vPos.y * 1.2);
        vec3 color = mix(uDeep, uBlue, depth);

        float foamLine = smoothstep(0.15, 0.25, vPos.y * 1.2);
        color = mix(color, uFoam, foamLine * 0.25);

        float shimmer = sin(vUv.x * 30.0 + uTime * 2.0) * 0.04;
        shimmer += sin(vUv.y * 25.0 - uTime * 1.4) * 0.03;
        color += shimmer;

        gl_FragColor = vec4(color, 1.0);
      }
    `,
    side: THREE.DoubleSide
  });

  ocean = new THREE.Mesh(geo, material);
  scene.add(ocean);

  animate();
}

function animate() {
  requestAnimationFrame(animate);

  let t = (Date.now() - start) * 0.001;
  material.uniforms.uTime.value = t;

  camera.position.x = Math.sin(t * 0.25) * 0.22;
  camera.position.y = 1.2 + Math.sin(t * 0.15) * 0.06;
  camera.rotation.z = Math.sin(t * 0.1) * 0.02;
  camera.lookAt(0, 0, 0);

  renderer.render(scene, camera);
}

window.addEventListener("resize", () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});

document.addEventListener("DOMContentLoaded", () => {
  setTimeout(initOcean, 150);
});
</script>
