<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SideGuy Solutions | Where Code Meets the Coastline</title>
  <meta
    name="description"
    content="SideGuy Solutions — Web3 coastal concierge for tech, transport, and smarter systems in North County. From Solana Beach to Encinitas, PJ helps you move, build, and live freely."
  />

  <style>
    :root {
      --bg: #020617;
      --blue-bg: radial-gradient(circle at top, #38bdf8 0%, #0f172a 45%, #020617 100%);
      --card: rgba(15, 23, 42, 0.9);
      --text: #e2e8f0;
    }

    body {
      margin: 0;
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      color: var(--text);
      overflow-x: hidden;
    }

    #ocean-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    .hero {
      text-align: center;
      padding-top: 18vh;
    }

    h1 {
      font-size: 3rem;
      font-weight: 800;
      margin: 0;
    }

    .glass {
      background: var(--card);
      backdrop-filter: blur(12px);
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.1);
      padding: 26px;
      margin: 40px auto;
      max-width: 680px;
    }

    #pjOrb {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: var(--blue-bg);
      box-shadow: 0 0 25px rgba(56,189,248,0.5);
      margin: 40px auto;
      animation: orbPulse 3s ease-in-out infinite;
      cursor: pointer;
    }

    @keyframes orbPulse {
      0% { transform: scale(1); box-shadow: 0 0 18px rgba(56,189,248,0.4); }
      50% { transform: scale(1.08); box-shadow: 0 0 35px rgba(56,189,248,0.7); }
      100% { transform: scale(1); box-shadow: 0 0 18px rgba(56,189,248,0.4); }
    }
  </style>
</head>

<body>

  <canvas id="ocean-canvas"></canvas>

  <div class="hero">
    <h1>SideGuy Solutions</h1>
    <p>Your coastal concierge for apps, AI, and ocean-powered UX.</p>
  </div>

  <div id="pjOrb" onclick="summonPJ()"></div>

  <script>
    function summonPJ() {
      window.location.href = "mailto:support@sideguysolutions.com?subject=Summon%20PJ";
    }
  </script>

  <!-- Three.js -->
  <script src="https://unpkg.com/three@0.138.0/build/three.min.js"></script>

  <script>
    let scene, camera, renderer, oceanMesh, startTime;

    function initOcean() {
      const canvas = document.getElementById('ocean-canvas');
      renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(2, window.devicePixelRatio));
      renderer.setClearColor(0x020617, 1);

      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
      camera.position.set(0, 1.6, 4.2);
      camera.lookAt(0, 0, 0);

      const geometry = new THREE.PlaneGeometry(16, 16, 200, 200);

      const uniforms = { uTime: { value: 0 } };

      const vertex = `
        uniform float uTime;
        varying float vWave;
        void main() {
          vec3 pos = position;
          float t = uTime * 0.6;
          float wave1 = sin(pos.x * 1.2 + t) * 0.18;
          float wave2 = sin(pos.y * 1.5 + t * 0.7) * 0.14;
          float wave3 = sin((pos.x + pos.y) * 0.9 + t * 0.4) * 0.1;
          pos.z = wave1 + wave2 + wave3;
          vWave = pos.z;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
        }
      `;

      const fragment = `
        varying float vWave;
        void main() {
          vec3 deep = vec3(0.02, 0.06, 0.18);
          vec3 mid  = vec3(0.08, 0.32, 0.55);
          vec3 top  = vec3(0.15, 0.72, 0.85);

          float w = smoothstep(-0.4, 0.4, vWave);
          vec3 color = mix(deep, mid, w);
          color = mix(color, top, w * 0.6);

          gl_FragColor = vec4(color, 1.0);
        }
      `;

      const material = new THREE.ShaderMaterial({
        uniforms,
        vertexShader: vertex,
        fragmentShader: fragment,
        side: THREE.DoubleSide
      });

      oceanMesh = new THREE.Mesh(geometry, material);
      oceanMesh.rotation.x = -Math.PI / 2;
      oceanMesh.position.y = -1.1;
      scene.add(oceanMesh);

      startTime = performance.now();
      animate();
    }

    function animate() {
      requestAnimationFrame(animate);
      let t = (performance.now() - startTime) / 1000;
      oceanMesh.material.uniforms.uTime.value = t;

      camera.position.x = Math.sin(t * 0.1) * 0.6;
      camera.lookAt(0, 0, 0);

      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    });

    initOcean();
  </script>

</body>
</html>
