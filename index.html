<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SideGuy Solutions – Where Code Meets the Coastline</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #020617;
      font-family: system-ui, sans-serif;
      color: white;
    }

    #ocean-canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      z-index: -2;
    }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 32px;
      text-align: center;
      backdrop-filter: blur(6px);
    }

    h1 {
      font-size: 2.8rem;
      margin-bottom: 10px;
      text-shadow: 0 8px 24px rgba(0,0,0,0.6);
    }

    p {
      max-width: 420px;
      font-size: 1rem;
      opacity: 0.9;
      margin-bottom: 22px;
    }

    /* Floating Orb */
    #orb {
      width: 90px;
      height: 90px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 20%, #e0f2fe, #38bdf8 50%, #0f172a 100%);
      box-shadow: 0 0 22px rgba(56,189,248,0.85), 0 0 50px rgba(15,23,42,0.9);
      animation: float 4s ease-in-out infinite;
      cursor: pointer;
      position: relative;
    }

    #orb::after {
      content: "";
      position: absolute;
      inset: 18%;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.5);
      opacity: 0.7;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

    /* Portal ripple */
    body.portal-ripple::before {
      content: "";
      position: fixed;
      left: 50%;
      top: 50%;
      width: 10vmax;
      height: 10vmax;
      border-radius: 999px;
      transform: translate(-50%, -50%);
      border: 2px solid rgba(56,189,248,0.5);
      animation: ripple 1.4s ease-out;
      pointer-events: none;
    }

    @keyframes ripple {
      0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(6); opacity: 0; }
    }
  </style>
</head>

<body>

<canvas id="ocean-canvas"></canvas>

<div class="overlay">
  <h1>SideGuy Solutions</h1>
  <p>Where code meets the coastline. Tap the orb to summon PJ.</p>
  <div id="orb"></div>
</div>

<script>
/* ------------------------------------------
   INLINE THREE.JS — CUSTOM BUILD FOR OCEAN
--------------------------------------------- */

// Minimal THREE namespace (we only need core math + WebGLRenderer)
const THREE = {
  Scene: class { constructor(){ this.children=[] } add(o){this.children.push(o)} },
  PerspectiveCamera: class {
    constructor(fov,aspect,near,far){
      this.fov=fov;this.aspect=aspect;this.near=near;this.far=far;
      this.position={x:0,y:0,z:0,set(x,y,z){this.x=x;this.y=y;this.z=z}};
    }
    lookAt(){} updateProjectionMatrix(){}
  },
  WebGLRenderer: class {
    constructor(opts){
      this.canvas=opts.canvas;
      this.ctx=this.canvas.getContext("webgl",{antialias:true});
    }
    setPixelRatio(){} 
    setSize(w,h){ this.canvas.width=w; this.canvas.height=h; }
    render(scene,camera){}
  }
};

// We implement a fake renderer because we only draw via shader below.
// Now real WebGL shader setup:

const canvas = document.getElementById("ocean-canvas");
const gl = canvas.getContext("webgl");

canvas.width = innerWidth;
canvas.height = innerHeight;

const vertex = `
attribute vec2 pos;
varying vec2 vUv;
void main() {
  vUv = (pos + 1.0) * 0.5;
  gl_Position = vec4(pos, 0.0, 1.0);
}
`;

const fragment = `
precision highp float;
uniform float uTime;
varying vec2 vUv;

void main() {
  // Colors
  vec3 deep = vec3(0.01, 0.07, 0.16);
  vec3 mid = vec3(0.0, 0.28, 0.45);
  vec3 shallow = vec3(0.1, 0.55, 0.65);

  float t1 = sin((vUv.x + uTime*0.05) * 9.0) * 0.02;
  float t2 = sin((vUv.y - uTime*0.07) * 13.0) * 0.02;
  float mixVal = clamp(vUv.y + (t1+t2)*2.2, 0.0, 1.0);

  vec3 color = mix(deep, mid, mixVal);
  color = mix(color, shallow, smoothstep(0.55, 1.1, mixVal));

  float foam = smoothstep(0.75, 0.98, mixVal + sin(uTime * 0.5)*0.05);
  vec3 foamColor = vec3(0.88,0.97,0.99);
  color = mix(color, foamColor, foam*0.5);

  gl_FragColor = vec4(color, 1.0);
}
`;

function compileShader(type,src){
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  return s;
}

const vs = compileShader(gl.VERTEX_SHADER, vertex);
const fs = compileShader(gl.FRAGMENT_SHADER, fragment);

const program = gl.createProgram();
gl.attachShader(program, vs);
gl.attachShader(program, fs);
gl.linkProgram(program);

gl.useProgram(program);

const buffer = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

const loc = gl.getAttribLocation(program, "pos");
gl.enableVertexAttribArray(loc);
gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

const uTime = gl.getUniformLocation(program, "uTime");

// Resize fix
addEventListener("resize", () => {
  canvas.width = innerWidth;
  canvas.height = innerHeight;
  gl.viewport(0,0,gl.canvas.width, gl.canvas.height);
});

// Animate
function animate(t){
  gl.uniform1f(uTime, t*0.001);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);

/* --------------------------
   ORB → EMAIL + RIPPLE
--------------------------- */

document.getElementById("orb").addEventListener("click", () => {
  document.body.classList.add("portal-ripple");

  setTimeout(() => {
    location.href =
      "mailto:pj@sideguysolutions.com?subject=Summon%20PJ&body=Hey%20PJ%2C%20I%20tapped%20the%20orb%20on%20SideGuy%20Solutions.";
  }, 420);

  setTimeout(() => {
    document.body.classList.remove("portal-ripple");
  }, 1500);
});

</script>

</body>
</html>
