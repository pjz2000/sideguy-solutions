<!DOCTYPE html>

<html lang="en">

<head>

  <!-- BASIC META -->

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />



  <!-- PAGE-SPECIFIC SEO -->

  <title>Software Development Near Me | Local San Diego Builder · SideGuy Solutions</title>

  <meta name="description" content="Looking for software development near you? SideGuy Solutions is a local San Diego builder offering custom software, app development, automation, and tech services for real businesses.">

  <meta name="keywords" content="software development near me, app development near me, custom software near me, developer near me, san diego software development, sideguy solutions">



  <!-- CLEAN SEO PAGE STYLES (FROM TEMPLATE) -->

  <style>

    :root {

      --bg: radial-gradient(circle at top, #0ea5e9 0%, #020617 50%, #000 100%);

      --card: rgba(15, 23, 42, 0.9);

      --accent: #38bdf8;

      --text: #e5e7eb;

      --muted: #9ca3af;

    }

    * { box-sizing: border-box; }

    body {

      margin: 0;

      font-family: system-ui, sans-serif;

      background: var(--bg);

      color: var(--text);

      min-height: 100vh;

      display: flex;

      flex-direction: column;

    }

    header {

      padding: 18px 20px;

      display: flex;

      justify-content: space-between;

      max-width: 1080px;

      margin: 0 auto;

    }

    .brand {

      font-weight: 700;

      letter-spacing: 0.06em;

      font-size: 0.9rem;

      text-transform: uppercase;

      color: var(--accent);

    }

    .nav-link {

      font-size: 0.9rem;

      color: var(--muted);

      text-decoration: none;

      border-radius: 999px;

      padding: 6px 14px;

      border: 1px solid rgba(148,163,184,0.3);

      backdrop-filter: blur(12px);

    }

    .nav-link:hover {

      border-color: var(--accent);

      color: var(--accent);

    }



    main { flex: 1; width: 100%; }



    /* HERO SECTION */

    .hero {

      max-width: 1080px;

      margin: 0 auto;

      padding: 32px 20px 40px;

      display: grid;

      grid-template-columns: minmax(0,3fr) minmax(0,2.3fr);

      gap: 32px;

    }

    @media (max-width: 860px) {

      .hero { grid-template-columns: 1fr; padding-top: 10px; }

    }



    .hero-left h1 {

      font-size: clamp(2.2rem, 3.5vw, 3rem);

      margin: 0 0 10px;

    }

    .hero-pill {

      display: inline-flex;

      align-items: center;

      gap: 6px;

      font-size: 0.8rem;

      padding: 5px 12px;

      border-radius: 999px;

      background: rgba(15,23,42,0.9);

      border: 1px solid rgba(148,163,184,0.5);

      color: var(--muted);

      margin-bottom: 12px;

    }

    .hero-pill span {

      width: 6px; height: 6px;

      border-radius: 999px;

      background: #22c55e;

      box-shadow: 0 0 10px rgba(34,197,94);

    }

    .hero-sub {

      font-size: 1.02rem;

      color: var(--muted);

      margin-bottom: 18px;

      max-width: 540px;

    }

    .hero-tags {

      display: flex;

      flex-wrap: wrap;

      gap: 6px;

      margin-bottom: 24px;

    }

    .hero-tags span {

      font-size: 0.78rem;

      padding: 4px 10px;

      border-radius: 999px;

      background: rgba(15,23,42,0.9);

      border: 1px solid rgba(148,163,184,0.5);

      color: var(--muted);

    }

    .cta-row {

      display: flex;

      flex-wrap: wrap;

      gap: 12px;

      align-items: center;

    }

    .btn-primary {

      display: inline-flex;

      align-items: center;

      gap: 8px;

      padding: 11px 20px;

      border-radius: 999px;

      font-size: 0.95rem;

      font-weight: 600;

      background: linear-gradient(135deg,#38bdf8,#22d3ee);

      color: #0f172a;

      text-decoration: none;

      box-shadow: 0 18px 45px rgba(8,47,73,0.5);

    }

    .btn-primary span { font-size: 1.1rem; }

    .cta-note { font-size: 0.85rem; color: var(--muted); }

  </style>

</head>
