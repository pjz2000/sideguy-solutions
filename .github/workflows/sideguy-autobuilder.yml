name: SideGuy Auto Builder

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:          # manual trigger via GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install feedparser -q

      - name: Setup Directories
        run: mkdir -p hubs pillars sitemaps signals

      - name: Harvest Signals
        run: python3 scripts/signal-harvester.py

      - name: Convert Signals to Topics
        run: python3 scripts/signal-connector.py

      - name: Expand Topics (Matrix)
        run: python3 scripts/topic-matrix.py

      - name: Generate Topics + Build Pages
        run: python3 scripts/generate-topics.py

      - name: Build Authority Pages
        run: python3 scripts/build-authority.py

      - name: Add JSON-LD Schema
        run: python3 scripts/add-schema.py

      - name: Add FAQ + Breadcrumb Schema
        run: python3 scripts/add-faq-schema.py

      - name: Refresh Stale Pages
        run: python3 scripts/page-refresh.py

      - name: Inject Memes (idempotent)
        run: python3 tools/page-upgrader/meme_injector.py

      - name: Trending Topic Fetchers
        run: |
          python3 tools/trending-topic-engine/google_trends_fetcher.py
          python3 tools/trending-topic-engine/reddit_topic_scraper.py
          python3 tools/trending-topic-engine/auto_builder.py

      - name: Generate Sitemaps
        run: python3 scripts/generate-sitemap.py

      - name: Build Report
        run: python3 scripts/build-report.py

      - name: Commit & Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "sideguy-autobuilder"
          git config --global user.email "builder@sideguy.ai"
          if [[ -n $(git status --porcelain) ]]; then
            git add .
            git commit -m "🤖 Auto-built SideGuy pages [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
            git push
          else
            echo "No new pages to commit."
          fi
