<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Simple Ocean Test</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
      background: #0077be; /* Ocean blue */
    }

    .wave {
      position: absolute;
      width: 200%;
      height: 200px;
      bottom: 0;
      left: -50%;
      background: rgba(255,255,255,0.4);
      opacity: 0.4;
      animation: waveAnim 6s infinite linear;
      transform: rotate(2deg);
      filter: blur(8px);
    }

    @keyframes waveAnim {
      0% { transform: translateX(0) rotate(2deg); }
      100% { transform: translateX(50%) rotate(2deg); }
    }
  </style>
</head>

<body>
  <div class="wave"></div>
  <div class="wave" style="bottom: 40px; opacity: 0.25; animation-duration: 9s;"></div>
  <div class="wave" style="bottom: 80px; opacity: 0.2; animation-duration: 12s;"></div>
</body>
</html>
