<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Simple Ocean Test</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
      background: #0077be; /* Ocean blue */
    }

    .wave {
      position: absolute;
      width: 200%;
      height: 200px;
      bottom: 0;
      left: -50%;
      background: rgba(255,255,255,0.4);
      opacity: 0.4;
      animation: waveAnim 6s infinite linear;
      transform: rotate(2deg);
      filter: blur(8px);
    }

    @keyframes waveAnim {
      0% { transform: translateX(0) rotate(2deg); }
