<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>SideGuy Solutions | Ocean Mode</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    height: 100%;
    background: #003b6f;
    font-family: sans-serif;
  }

  #ocean-canvas {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    z-index: -1;
  }

  #header {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 10;
    color: #bde8ff;
    font-size: 20px;
    text-shadow: 0 0 10px #000;
  }

  #content-box {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.35);
    padding: 20px 30px;
    border-radius: 12px;
    color: white;
    font-size: 18px;
    backdrop-filter: blur(10px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    z-index: 20;
  }
</style>
</head>

<body>

<div id="header">🌊 SideGuy Solutions — Ocean Mode</div>

<div id="content-box">
  Your ocean portal is ALIVE.<br>
  <small>Stage 1 — core ocean engine running.</small>
</div>

<canvas id="ocean-canvas"></canvas>

<!-- Minimal Three.js + Water -->
<script src="https://unpkg.com/three@0.138.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.138.0/examples/js/objects/Water.js"></script>

<script>
let camera, scene, renderer, water;

init();
animate();

function init() {
  const canvas = document.getElementById("ocean-canvas");

  renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth / window.innerHeight,
    1,
    20000
  );
  camera.position.set(0, 40, 120);

  const waterGeometry = new THREE.PlaneGeometry(20000, 20000);

  const waterNormals = new THREE.TextureLoader().load(
    "https://threejs.org/examples/textures/waternormals.jpg",
    (texture) => {
      texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
    }
  );

  water = new THREE.Water(waterGeometry, {
    textureWidth: 1024,
    textureHeight: 1024,
    waterNormals,
    sunDirection: new THREE.Vector3(),
    sunColor: 0xffffff,
    waterColor: 0x1e90ff,
    distortionScale: 3.2,
    fog: false,
  });

  water.rotation.x = -Math.PI / 2;
  scene.add(water);

  window.addEventListener("resize", onWindowResize);
}

function onWindowResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
  requestAnimationFrame(animate);

  if (water.material.uniforms["time"]) {
    water.material.uniforms["time"].value += 0.8 / 60;
  }

  camera.position.x = Math.sin(Date.now() * 0.0002) * 20;
  camera.lookAt(0, 0, 0);

  renderer.render(scene, camera);
}
</script>

</body>
</html>
